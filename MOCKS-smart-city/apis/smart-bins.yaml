openapi: 3.0.2
info:
  title: Smart Bins API
  version: '1.0'
  description: API for managing connected waste bins in urban areas. Supports creation, lookup, update, and deletion of waste bins, as well as real-time monitoring of fill levels, collection history, and bin status. Supports filtering by standardized city zones (zoneId), bin type, and operational status, enabling cross-domain orchestration such as prioritizing waste collection in zones with active events or high pedestrian density.
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Bins+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Bin:
      allOf:
      - $ref: '#/components/schemas/NewBin'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the waste bin
        required:
        - id
    NewBin:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location of the bin
        fillLevel:
          type: integer
          minimum: 0
          maximum: 100
          description: Current fill percentage (0-100)
        lastEmptied:
          type: string
          format: date-time
          description: Timestamp of last emptying
        nextCollection:
          type: string
          format: date-time
          description: Scheduled timestamp for the next collection
        binType:
          type: string
          enum:
          - general
          - recyclable
          - organic
          - glass
          - electronic
          description: Type of waste the bin is intended for
        sensorBattery:
          type: integer
          minimum: 0
          maximum: 100
          description: Battery level of the embedded IoT sensor (0-100%)
        status:
          type: string
          enum:
          - normal
          - full
          - overflowing
          - maintenance
          - offline
          description: Current bin status
      required:
      - zoneId
      - location
      - fillLevel
      - lastEmptied
      - nextCollection
      - binType
      - sensorBattery
      - status
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Bins microservice is reachable and responsive.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /bin:
    get:
      description: "Retrieve the list of smart waste bins registered in the city. Use query parameters to filter by zone, status or bin type - for example, to find all overflowing bins in Z-CENTRO or all organic bins requiring collection.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search bins
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "status", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: status
        in: query
        schema:
          type: string
          enum:
          - normal
          - full
          - overflowing
          - maintenance
          - offline
        description: Filter bins by operational status (e.g., overflowing to prioritize urgent collection)
        examples:
          by_status_overflowing:
            value: overflowing
      - name: binType
        in: query
        schema:
          type: string
          enum:
          - general
          - recyclable
          - organic
          - glass
          - electronic
        description: Filter bins by waste category
        examples:
          by_type_recyclable:
            value: recyclable
          by_type_general:
            value: general
          by_type_organic:
            value: organic
          by_type_glass:
            value: glass
          by_type_electronic:
            value: electronic
      responses:
        '200':
          description: List of bins matching the specified filters
