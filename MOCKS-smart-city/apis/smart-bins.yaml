    post:
      description: Register a new smart waste bin in the city waste management system.
      summary: Register new bin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBin'
            examples:
              new_bin:
                value:
                  zoneId: Z-CENTRO
                  location: Villa Comunale, Viale dei Rettori, Benevento
                  fillLevel: 10
                  lastEmptied: '2025-09-25T06:30:00Z'
                  nextCollection: '2025-09-27T07:00:00Z'
                  binType: organic
                  sensorBattery: 100
                  status: normal
      responses:
        '201':
          description: Smart bin created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
              examples:
                created:
                  value:
                    id: 3
                    zoneId: Z-CENTRO
                    location: Villa Comunale, Viale dei Rettori, Benevento
                    fillLevel: 10
                    lastEmptied: '2025-09-25T06:30:00Z'
                    nextCollection: '2025-09-27T07:00:00Z'
                    binType: organic
                    sensorBattery: 100
                    status: normal
  /bin/{id}:
    get:
      description: Retrieve the current status of a specific waste bin by ID.
      summary: Get bin details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          bin_1:
            value: 1
      responses:
        '200':
          description: Bin details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
              examples:
                bin_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Corso Garibaldi angolo Via Roma, Benevento
                    fillLevel: 35
                    lastEmptied: '2025-09-24T07:00:00Z'
                    nextCollection: '2025-09-26T07:00:00Z'
                    binType: general
                    sensorBattery: 88
                    status: normal
        '404':
          description: Bin not found
    put:
      description: Update the status of a specific smart waste bin by ID.
      summary: Update bin details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBin'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Corso Garibaldi angolo Via Roma, Benevento
                  fillLevel: 100
                  lastEmptied: '2025-09-25T08:00:00Z'
                  nextCollection: '2025-09-25T14:00:00Z'
                  binType: general
                  sensorBattery: 86
                  status: overflowing
      responses:
        '200':
          description: Bin updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Corso Garibaldi angolo Via Roma, Benevento
                    fillLevel: 100
                    lastEmptied: '2025-09-25T08:00:00Z'
                    nextCollection: '2025-09-25T14:00:00Z'
                    binType: general
                    sensorBattery: 86
                    status: overflowing
        '404':
          description: Bin not found
    delete:
      description: Permanently remove a specific waste bin from the city registry.
      summary: Delete bin by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Bin successfully deleted
        '404':
          description: Bin not found
  /register:
    post:
      description: Register this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
