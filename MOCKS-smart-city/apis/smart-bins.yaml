openapi: 3.0.2
info:
  title: Smart Bins API
  version: '1.0'
  description: 'Smart Bins API for managing connected waste bins in urban areas. Compatible with the Smart Waste Management system, this service allows interaction with bin references.

    Supports creation, lookup, update, and deletion of waste bins, as well as real-time monitoring of fill levels, collection history, and bin status.'
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Bins+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    Bin:
      allOf:
        - $ref: '#/components/schemas/NewBin'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the waste bin
          required:
            - id
    NewBin:
      type: object
      properties:
        location:
          type: string
          description: Physical location of the bin
        fillLevel:
          type: integer
          minimum: 0
          maximum: 100
          description: Current fill percentage (0-100)
        lastEmptied:
          type: string
          format: date-time
          description: Timestamp of last emptying
        nextCollection:
          type: string
          format: date-time
          description: Scheduled timestamp for the next collection
        binType:
          type: string
          enum:
            - general
            - recyclable
            - organic
            - glass
            - electronic
          description: Type of waste the bin is intended for
        sensorBattery:
          type: integer
          minimum: 0
          maximum: 100
          description: Battery level of the embedded IoT sensor (0-100%)
        status:
          type: string
          enum:
            - normal
            - full
            - overflowing
            - maintenance
            - offline
          description: Current bin status
      required:
        - location
        - fillLevel
        - lastEmptied
        - nextCollection
        - binType
        - sensorBattery
        - status
paths:
  /health:
    get:
      description: Health check endpoint to verify if the Smart Bins API service is running and responsive
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /bin:
    get:
      description: Retrieve the list of all smart waste bins in the city, including fill level, bin type, battery level and next scheduled collection
      summary: List all bins
      responses:
        '200':
          description: List of all bins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bin'
              examples:
                example_list:
                  value:
                    - id: 1
                      location: Corso Garibaldi angolo Via Roma, Benevento
                      fillLevel: 35
                      lastEmptied: '2025-09-24T07:00:00Z'
                      nextCollection: '2025-09-26T07:00:00Z'
                      binType: general
                      sensorBattery: 88
                      status: normal
                    - id: 2
                      location: Piazza Risorgimento, Benevento
                      fillLevel: 92
                      lastEmptied: '2025-09-22T08:00:00Z'
                      nextCollection: '2025-09-25T08:00:00Z'
                      binType: recyclable
                      sensorBattery: 41
                      status: full
    post:
      description: Register a new smart waste bin in the city waste management system, specifying location, type, fill level and next collection time
      summary: Register new bin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBin'
            examples:
              new_bin:
                value:
                  location: Villa Comunale, Viale dei Rettori, Benevento
                  fillLevel: 10
                  lastEmptied: '2025-09-25T06:30:00Z'
                  nextCollection: '2025-09-27T07:00:00Z'
                  binType: organic
                  sensorBattery: 100
                  status: normal
      responses:
        '201':
          description: Smart bin created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
              examples:
                created:
                  value:
                    id: 3
                    location: Villa Comunale, Viale dei Rettori, Benevento
                    fillLevel: 10
                    lastEmptied: '2025-09-25T06:30:00Z'
                    nextCollection: '2025-09-27T07:00:00Z'
                    binType: organic
                    sensorBattery: 100
                    status: normal
  /bin/{id}:
    get:
      description: Retrieve the current status of a specific waste bin by ID, including fill level, battery, last emptied time and scheduled next collection
      summary: Get bin details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            bin_1:
              value: 1
      responses:
        '200':
          description: Bin details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
              examples:
                bin_1:
                  value:
                    id: 1
                    location: Corso Garibaldi angolo Via Roma, Benevento
                    fillLevel: 35
                    lastEmptied: '2025-09-24T07:00:00Z'
                    nextCollection: '2025-09-26T07:00:00Z'
                    binType: general
                    sensorBattery: 88
                    status: normal
        '404':
          description: Bin not found
    put:
      description: Update the status of a specific smart waste bin by ID, such as fill level, battery level, collection schedule or operational status
      summary: Update bin details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBin'
            examples:
              update:
                value:
                  location: Corso Garibaldi angolo Via Roma, Benevento
                  fillLevel: 100
                  lastEmptied: '2025-09-25T08:00:00Z'
                  nextCollection: '2025-09-25T14:00:00Z'
                  binType: general
                  sensorBattery: 86
                  status: overflowing
      responses:
        '200':
          description: Bin updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
              examples:
                updated:
                  value:
                    id: 1
                    location: Corso Garibaldi angolo Via Roma, Benevento
                    fillLevel: 100
                    lastEmptied: '2025-09-25T08:00:00Z'
                    nextCollection: '2025-09-25T14:00:00Z'
                    binType: general
                    sensorBattery: 86
                    status: overflowing
        '404':
          description: Bin not found
    delete:
      description: Remove a specific smart waste bin from the city waste management registry by its ID
      summary: Delete bin by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Smart bin deleted
        '404':
          description: Bin not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service to Consul
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
