openapi: 3.0.2
info:
  title: Smart Public Transport and Transit API
  version: '1.0'
  description: API for managing public transport vehicles (buses, trams, metro) and routes across the city. Crucial for urban mobility orchestration. Supports dynamic filtering by city zones (zoneId) and operational status. Supports multi-zone queries (zoneIds) to find vehicles across all zones returned by a previous task. Can be used as an actuator to halt or reroute transit services in specific zones during environmental emergencies or severe traffic congestion.
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Public+Transport+and+Transit+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Vehicle:
      allOf:
      - $ref: '#/components/schemas/NewVehicle'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the vehicle
        required:
        - id
    NewVehicle:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier where the vehicle is currently located (e.g., Z-CENTRO, Z-NORD)
        routeId:
          type: string
          description: Identifier of the route the vehicle is currently serving
        vehicleType:
          type: string
          enum:
          - bus
          - tram
          - metro
          - ferry
          description: Type of public transport vehicle
        currentLocation:
          type: string
          description: Current GPS-based or stop-based location of the vehicle
        occupancy:
          type: integer
          description: Current number of passengers on board
        capacity:
          type: integer
          description: Maximum passenger capacity of the vehicle
        status:
          type: string
          enum:
          - in-service
          - out-of-service
          - delayed
          - maintenance
          - end-of-line
          - suspended
          description: Current operational status of the vehicle
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last telemetry update
      required:
      - zoneId
      - routeId
      - vehicleType
      - currentLocation
      - occupancy
      - capacity
      - status
      - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Public Transport microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /vehicle:
    get:
      description: "Retrieve public transport vehicles currently tracked by the system. Use query parameters to filter by city zone, multiple zones, operational status, or vehicle type - for example to find all delayed buses in Z-CENTRO, or all vehicles across every zone where a traffic incident has been detected.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search transit vehicles
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "status", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: zoneIds
        in: query
        schema:
          type: array
          items:
            type: string
            enum:
            - Z-CENTRO
            - Z-NORD
            - Z-SUD
            - Z-EST
            - Z-OVEST
        style: form
        explode: false
        description: 'Multiple city zones, comma-separated. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST. Example: Z-CENTRO,Z-NORD,Z-SUD.'
        examples:
          multiple_zones:
            value: Z-CENTRO,Z-NORD
      - name: status
        in: query
        schema:
          type: string
          enum:
          - in-service
          - out-of-service
          - delayed
          - maintenance
          - end-of-line
          - suspended
        description: Filter by vehicle status (e.g., delayed, in-service, suspended)
        examples:
          by_status_delayed:
            value: delayed
      - name: vehicleType
        in: query
        schema:
          type: string
          enum:
          - bus
          - tram
          - metro
          - ferry
        description: Filter by type of vehicle
        examples:
          by_type_bus:
            value: bus
          by_type_metro:
            value: metro
          by_type_ferry:
            value: ferry
      responses:
        '200':
          description: List of vehicles matching the specified filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
              examples:
                example_list:
                  value:
                  - id: 1
                    zoneId: Z-CENTRO
                    routeId: Linea 1
                    vehicleType: bus
                    currentLocation: Stazione FS Centrale, Piazzale Colonna, Benevento
                    occupancy: 38
                    capacity: 75
                    status: in-service
                    lastUpdated: '2025-09-25T10:05:00Z'
