    post:
      description: Register a new public transport vehicle in the city transit system.
      summary: Register new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewVehicle'
            examples:
              new_vehicle:
                value:
                  zoneId: Z-SUD
                  routeId: Linea 16
                  vehicleType: bus
                  currentLocation: Deposito Trotta Bus, Via Santa Colomba, Benevento
                  occupancy: 0
                  capacity: 75
                  status: out-of-service
                  lastUpdated: '2025-09-25T06:00:00Z'
      responses:
        '201':
          description: Vehicle registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                created:
                  value:
                    id: 3
                    zoneId: Z-SUD
                    routeId: Linea 16
                    vehicleType: bus
                    currentLocation: Deposito Trotta Bus, Via Santa Colomba, Benevento
                    occupancy: 0
                    capacity: 75
                    status: out-of-service
                    lastUpdated: '2025-09-25T06:00:00Z'
  /vehicle/{id}:
    get:
      description: Retrieve real-time data for a specific public transport vehicle by ID.
      summary: Get vehicle details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          vehicle_1:
            value: 1
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                vehicle_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    routeId: Linea 1
                    vehicleType: bus
                    currentLocation: Stazione FS Centrale, Piazzale Colonna, Benevento
                    occupancy: 38
                    capacity: 75
                    status: in-service
                    lastUpdated: '2025-09-25T10:05:00Z'
        '404':
          description: Vehicle not found
    put:
      description: Update the real-time data of a specific public transport vehicle by ID.
      summary: Update vehicle by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewVehicle'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  routeId: Linea 1
                  vehicleType: bus
                  currentLocation: Viale Principe di Napoli - Fermata 2, Benevento
                  occupancy: 50
                  capacity: 75
                  status: in-service
                  lastUpdated: '2025-09-25T10:20:00Z'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    routeId: Linea 1
                    vehicleType: bus
                    currentLocation: Viale Principe di Napoli - Fermata 2, Benevento
                    occupancy: 50
                    capacity: 75
                    status: in-service
                    lastUpdated: '2025-09-25T10:20:00Z'
        '404':
          description: Vehicle not found
    delete:
      description: Remove a specific public transport vehicle from the registry.
      summary: Delete vehicle by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Deleted successfully
        '404':
          description: Vehicle not found
  /vehicle/zone/{zoneId}/service-status:
    put:
      description: Dynamically halt, suspend, or resume public transport services across an entire zone. Critical for emergency response (e.g., suspending bus service in Z-CENTRO due to severe flooding or traffic gridlock).
      summary: Update transit service status for a zone
      parameters:
      - name: zoneId
        in: path
        required: true
        schema:
          type: string
        examples:
          zone_centro:
            value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newStatus:
                  type: string
                  enum:
                  - in-service
                  - suspended
                  - delayed
                  description: The new status to apply to all transit vehicles in this zone
                reason:
                  type: string
                  description: Reason for the service change (e.g., SEVERE_WEATHER, EMERGENCY, TRAFFIC_GRIDLOCK)
            examples:
              suspend_service:
                value:
                  newStatus: suspended
                  reason: SEVERE_WEATHER_WARNING
      responses:
        '200':
          description: Service status for the zone updated successfully
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: Zone service status updated
  /register:
    post:
      description: Register this service to the discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
