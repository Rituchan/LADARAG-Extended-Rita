openapi: 3.0.2
info:
  title: Smart Public Transport API
  version: '1.0'
  description: 'Smart Public Transport API for managing public transport vehicles and routes across the city. Compatible with the City Transit System, this service allows interaction with vehicle references.

    Supports creation, lookup, update, and deletion of vehicles, including real-time position, occupancy, and operational status.'
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Public+Transport+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    Vehicle:
      allOf:
        - $ref: '#/components/schemas/NewVehicle'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the vehicle
          required:
            - id
    NewVehicle:
      type: object
      properties:
        routeId:
          type: string
          description: Identifier of the route the vehicle is currently serving
        vehicleType:
          type: string
          enum:
            - bus
            - tram
            - metro
            - ferry
          description: Type of public transport vehicle
        currentLocation:
          type: string
          description: Current GPS-based or stop-based location of the vehicle
        occupancy:
          type: integer
          description: Current number of passengers on board
        capacity:
          type: integer
          description: Maximum passenger capacity of the vehicle
        status:
          type: string
          enum:
            - in-service
            - out-of-service
            - delayed
            - maintenance
            - end-of-line
          description: Current operational status of the vehicle
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last telemetry update
      required:
        - routeId
        - vehicleType
        - currentLocation
        - occupancy
        - capacity
        - status
        - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Public Transport microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /vehicle:
    get:
      description: Retrieve all public transport vehicles in service across the city, including route, vehicle type, current location, occupancy level and operational status
      summary: List all vehicles
      responses:
        '200':
          description: List of all vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
              examples:
                example_list:
                  value:
                    - id: 1
                      routeId: Linea 1
                      vehicleType: bus
                      currentLocation: Stazione FS Centrale, Piazzale Colonna, Benevento
                      occupancy: 38
                      capacity: 75
                      status: in-service
                      lastUpdated: '2025-09-25T10:05:00Z'
                    - id: 2
                      routeId: Linea 3
                      vehicleType: bus
                      currentLocation: Viale Mellusi (Fermata Ospedale), Benevento
                      occupancy: 52
                      capacity: 75
                      status: delayed
                      lastUpdated: '2025-09-25T10:02:00Z'
    post:
      description: Register a new public transport vehicle in the city transit system, specifying route, vehicle type, capacity and initial operational status
      summary: Register new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewVehicle'
            examples:
              new_vehicle:
                value:
                  routeId: Linea 16
                  vehicleType: bus
                  currentLocation: Deposito Trotta Bus, Via Santa Colomba, Benevento
                  occupancy: 0
                  capacity: 75
                  status: out-of-service
                  lastUpdated: '2025-09-25T06:00:00Z'
      responses:
        '201':
          description: Vehicle registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                created:
                  value:
                    id: 3
                    routeId: Linea 16
                    vehicleType: bus
                    currentLocation: Deposito Trotta Bus, Via Santa Colomba, Benevento
                    occupancy: 0
                    capacity: 75
                    status: out-of-service
                    lastUpdated: '2025-09-25T06:00:00Z'
  /vehicle/{id}:
    get:
      description: Retrieve real-time data for a specific public transport vehicle by ID, including current location, passenger occupancy, route and service status
      summary: Get vehicle details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            vehicle_1:
              value: 1
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                vehicle_1:
                  value:
                    id: 1
                    routeId: Linea 1
                    vehicleType: bus
                    currentLocation: Stazione FS Centrale, Piazzale Colonna, Benevento
                    occupancy: 38
                    capacity: 75
                    status: in-service
                    lastUpdated: '2025-09-25T10:05:00Z'
        '404':
          description: Vehicle not found
    put:
      description: Update the real-time data of a specific public transport vehicle by ID, such as current location, occupancy, route assignment or operational status
      summary: Update vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewVehicle'
            examples:
              update:
                value:
                  routeId: Linea 1
                  vehicleType: bus
                  currentLocation: Viale Principe di Napoli - Fermata 2, Benevento
                  occupancy: 50
                  capacity: 75
                  status: in-service
                  lastUpdated: '2025-09-25T10:20:00Z'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                updated:
                  value:
                    id: 1
                    routeId: Linea 1
                    vehicleType: bus
                    currentLocation: Viale Principe di Napoli - Fermata 2, Benevento
                    occupancy: 50
                    capacity: 75
                    status: in-service
                    lastUpdated: '2025-09-25T10:20:00Z'
        '404':
          description: Vehicle not found
    delete:
      description: Remove a specific public transport vehicle from the city transit system registry by its ID
      summary: Delete vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Vehicle deleted
        '404':
          description: Vehicle not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
