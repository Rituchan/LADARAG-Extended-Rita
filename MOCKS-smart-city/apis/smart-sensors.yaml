openapi: 3.0.2
info:
  title: Smart Sensors API
  version: '1.0'
  description: 'Smart Sensors API for managing environmental sensor devices across
    the city. Compatible with the City Monitoring System, this service allows interaction
    with sensor references.

    Supports creation, lookup, update, and deletion of sensor units, including real-time
    environmental data tracking, battery status, and measurement units.'
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Sensors+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Sensor:
      allOf:
      - $ref: '#/components/schemas/NewSensor'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the sensor device
        required:
        - id
    NewSensor:
      type: object
      properties:
        location:
          type: string
          description: Physical location of the sensor
        sensorType:
          type: string
          enum:
          - temperature
          - humidity
          - air_quality
          - noise
          - light
          - pressure
          - wind_speed
          description: Type of environmental sensor
        lastReading:
          type: number
          format: float
          description: Most recent sensor reading value
        readingUnit:
          type: string
          enum:
          - 'Celsius'
          - '%'
          - AQI
          - dB
          - lux
          - hPa
          - km/h
          description: Unit of measurement for the last reading
        threshold:
          type: number
          format: float
          description: Alert threshold value for the sensor reading
        batteryLevel:
          type: integer
          minimum: 0
          maximum: 100
          description: Battery level of the sensor device (0-100)
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last reading update
        status:
          type: string
          enum:
          - active
          - inactive
          - maintenance
          - low_battery
          - fault
          description: Current sensor status
      required:
      - location
      - sensorType
      - lastReading
      - readingUnit
      - threshold
      - batteryLevel
      - lastUpdated
      - status
paths:
  /health:
    get:
      description: Health check endpoint to verify if the Smart Sensors API service is running and responsive
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
                  
  /sensor:
    get:
      description: Retrieve all environmental sensors deployed across the city, including
        type, last reading, measurement unit, battery level and alert threshold
      summary: List all sensors
      responses:
        '200':
          description: List of all sensor devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sensor'
              examples:
                example_list:
                  value:
                  - &id001
                    id: 1
                    location: Duomo di Benevento, Piazza Duomo, Benevento
                    sensorType: temperature
                    lastReading: 24.2
                    readingUnit: 'Celsius'
                    threshold: 38.0
                    batteryLevel: 90
                    lastUpdated: '2025-09-25T10:00:00Z'
                    status: active
                  - id: 2
                    location: Hortus Conclusus, Vico Noce, Benevento
                    sensorType: air_quality
                    lastReading: 48.3
                    readingUnit: AQI
                    threshold: 100.0
                    batteryLevel: 62
                    lastUpdated: '2025-09-25T09:45:00Z'
                    status: active
    post:
      description: Register a new environmental sensor in the city monitoring network,
        specifying location, sensor type, measurement unit and alert threshold
      summary: Register new sensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSensor'
            examples:
              new_sensor:
                value:
                  location: Ponte Leproso, Via Appia Antica, Benevento
                  sensorType: humidity
                  lastReading: 61.5
                  readingUnit: '%'
                  threshold: 85.0
                  batteryLevel: 100
                  lastUpdated: '2025-09-25T11:15:00Z'
                  status: active
      responses:
        '201':
          description: Sensor device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
              examples:
                created:
                  value:
                    id: 3
                    location: Ponte Leproso, Via Appia Antica, Benevento
                    sensorType: humidity
                    lastReading: 61.5
                    readingUnit: '%'
                    threshold: 85.0
                    batteryLevel: 100
                    lastUpdated: '2025-09-25T11:15:00Z'
                    status: active
  /sensor/{id}:
    get:
      description: Retrieve the latest reading and status of a specific environmental
        sensor by ID, including measurement unit, battery level and threshold
      summary: Get sensor details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          sensor_1:
            value: 1
      responses:
        '200':
          description: Sensor device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
              examples:
                sensor_1:
                  value: *id001
        '404':
          description: Sensor not found
    put:
      description: Update the configuration or latest reading of a specific environmental
        sensor by ID, such as reading value, battery level, threshold or status
      summary: Update sensor by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSensor'
            examples:
              update:
                value:
                  location: Duomo di Benevento, Piazza Duomo, Benevento
                  sensorType: temperature
                  lastReading: 25.0
                  readingUnit: °C
                  threshold: 38.0
                  batteryLevel: 88
                  lastUpdated: '2025-09-25T12:00:00Z'
                  status: active
      responses:
        '200':
          description: Sensor device updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
              examples:
                updated:
                  value:
                    id: 1
                    location: Duomo di Benevento, Piazza Duomo, Benevento
                    sensorType: temperature
                    lastReading: 25.0
                    readingUnit: °C
                    threshold: 38.0
                    batteryLevel: 88
                    lastUpdated: '2025-09-25T12:00:00Z'
                    status: active
        '404':
          description: Sensor not found
    delete:
      description: Remove a specific environmental sensor from the city monitoring
        network by its ID
      summary: Delete sensor by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Sensor deleted
        '404':
          description: Sensor not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul