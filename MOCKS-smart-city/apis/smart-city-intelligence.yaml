openapi: 3.0.2
info:
  title: Smart City Intelligence API
  version: '1.0'
  description: |-
    Cross-domain aggregation and goal-based intelligence service for the Smart City platform. This service acts as a read-only intelligence layer that joins real-time data from multiple microservices to answer composite queries that cannot be resolved through sequential API chaining alone - where results from one domain must be filtered, ranked, or combined with results from other domains before a meaningful answer can be returned.
    Designed for five families of orchestration scenarios:
      1. Safety & Alerts      - unified view of all active city alerts across domains
      2. Zone Pulse           - full real-time snapshot of a city zone across all services
      3. Mobility Planning    - goal-based parking and EV charging recommendations
      4. Tourist Experience   - attraction recommendations combining crowds, air quality and accessibility
      5. Urban Maintenance    - aggregated view of infrastructure items requiring urgent attention

    All endpoints are read-only (GET). Write operations must target the individual domain services.
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+City+Intelligence+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    EnvironmentalAlert:
      type: object
      properties:
        sensorId:
          type: integer
        zoneId:
          type: string
        sensorType:
          type: string
          enum:
          - temperature
          - humidity
          - air_quality
          - noise
          - light
          - pressure
          - wind_speed
        alertReason:
          type: string
        lastReading:
          type: number
        readingUnit:
          type: string
        location:
          type: string
    TrafficAlert:
      type: object
      properties:
        sensorId:
          type: integer
        zoneId:
          type: string
        location:
          type: string
        congestionLevel:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        incidentDetected:
          type: boolean
        averageSpeed:
          type: number
    EmergencyAlert:
      type: object
      properties:
        unitId:
          type: integer
        zoneId:
          type: string
        type:
          type: string
          enum:
          - fire
          - police
          - medical
          - rescue
          - hazmat
        status:
          type: string
        incidentId:
          type: string
        location:
          type: string
    ZonePulse:
      type: object
      properties:
        zoneId:
          type: string
        parkingSpotsAvailable:
          type: integer
        congestionLevel:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        airQualityIndex:
          type: number
        noiseLevel:
          type: number
        openAttractions:
          type: integer
        activeTransportLines:
          type: integer
        alertCount:
          type: integer
        overallScore:
          type: number
    ParkingRecommendation:
      type: object
      properties:
        parkingSpotId:
          type: integer
        zoneId:
          type: string
        location:
          type: string
        spotType:
          type: string
        pricePerHour:
          type: number
        congestionLevel:
          type: string
        distanceFromTarget:
          type: string
        score:
          type: number
    ChargingRecommendation:
      type: object
      properties:
        stationId:
          type: integer
        zoneId:
          type: string
        location:
          type: string
        chargingSpeed:
          type: string
        availableConnectors:
          type: integer
        pricePerKWh:
          type: number
        congestionLevel:
          type: string
        score:
          type: number
    AttractionRecommendation:
      type: object
      properties:
        attractionId:
          type: integer
        name:
          type: string
        zoneId:
          type: string
        category:
          type: string
        waitingTimeMinutes:
          type: integer
        currentVisitors:
          type: integer
        maxCapacity:
          type: integer
        ticketPriceEur:
          type: number
        wheelchairAccessible:
          type: boolean
        airQualityIndex:
          type: number
        parkingSpotsNearby:
          type: integer
        alertsInZone:
          type: integer
        score:
          type: number
    MaintenanceItem:
      type: object
      properties:
        domain:
          type: string
          enum:
          - bins
          - lights
          - sensors
          - buildings
          - reports
        itemId:
          type: integer
        zoneId:
          type: string
        location:
          type: string
        issue:
          type: string
        severity:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart City Intelligence service is reachable and responsive.
      summary: Health check
      x-microcks-operation:
        dispatcher: RANDOM
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /city/alerts:
    get:
      description: Aggregates all active alerts across all city domains into a single unified response. Combines active sensor alerts, traffic incidents, and emergency units currently responding. Use ?zoneId= to restrict to a specific zone, ?severity= for minimum severity level.
      summary: Get all active city alerts across all domains
      x-microcks-operation:
        dispatcher: RANDOM
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
      - name: severity
        in: query
        schema:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        description: Return only alerts at or above this severity level
        examples:
          high_only:
            value: high
      responses:
        '200':
          description: Unified list of active city alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  environmental:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnvironmentalAlert'
                  traffic:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrafficAlert'
                  emergency:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmergencyAlert'
                  totalAlerts:
                    type: integer
              examples:
                active_alerts:
                  value:
                    environmental:
                    - sensorId: 5
                      zoneId: Z-NORD
                      sensorType: air_quality
                      alertReason: HIGH_POLLUTION
                      lastReading: 185.0
                      readingUnit: AQI
                      location: Via Posillipo, Benevento
                    traffic:
                    - sensorId: 2
                      zoneId: Z-CENTRO
                      location: Corso Garibaldi - Piazza Risorgimento, Benevento
                      congestionLevel: critical
                      incidentDetected: true
                      averageSpeed: 4.2
                    emergency:
                    - unitId: 1
                      zoneId: Z-CENTRO
                      type: medical
                      status: responding
                      incidentId: INC-20250925-042
                      location: Piazza Risorgimento, Benevento
                    totalAlerts: 3
                no_alerts:
                  value:
                    environmental: []
                    traffic: []
                    emergency: []
                    totalAlerts: 0
  /city/zone/{zoneId}/pulse:
    get:
      description: 'Returns a full real-time snapshot of a specific city zone aggregating data from all domain services: parking, traffic, air quality, attractions, transport, and active alerts. Returns a composite liveability score (0-100).'
      summary: Get real-time zone pulse across all domains
      x-microcks-operation:
        dispatcher: RANDOM
      parameters:
      - name: zoneId
        in: path
        required: true
        schema:
          type: string
        examples:
          zone_centro:
            value: Z-CENTRO
          zone_nord:
            value: Z-NORD
      responses:
        '200':
          description: Zone pulse aggregated data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZonePulse'
              examples:
                zone_centro:
                  value:
                    zoneId: Z-CENTRO
                    parkingSpotsAvailable: 12
                    congestionLevel: medium
                    airQualityIndex: 42.0
                    noiseLevel: 61.0
                    openAttractions: 5
                    activeTransportLines: 3
                    alertCount: 1
                    overallScore: 71.5
                zone_nord_critical:
                  value:
                    zoneId: Z-NORD
                    parkingSpotsAvailable: 0
                    congestionLevel: critical
                    airQualityIndex: 185.0
                    noiseLevel: 82.0
                    openAttractions: 1
                    activeTransportLines: 1
                    alertCount: 4
                    overallScore: 18.0
  /city/mobility/best-parking:
    get:
      description: Finds and ranks available parking spots based on proximity to a target zone, traffic conditions, spot type, and price. Resolves queries like "find parking near the museum with low traffic" or "find a disabled parking spot in Z-CENTRO" without multi-step chaining.
      summary: Find best available parking for a goal
      x-microcks-operation:
        dispatcher: RANDOM
      parameters:
      - name: nearZoneId
        in: query
        schema:
          type: string
        description: Target zone the user wants to reach
        examples:
          near_centro:
            value: Z-CENTRO
      - name: spotType
        in: query
        schema:
          type: string
          enum:
          - standard
          - electric
          - disabled
          - motorcycle
          - reserved
        description: Required type of parking spot
        examples:
          electric:
            value: electric
      - name: maxCongestion
        in: query
        schema:
          type: string
          enum:
          - low
          - medium
          - high
        description: Maximum acceptable traffic congestion level in the parking zone
        examples:
          low_only:
            value: low
      - name: maxPricePerHour
        in: query
        schema:
          type: number
        description: Maximum acceptable hourly parking price
        examples:
          max_2eur:
            value: 2.0
      responses:
        '200':
          description: Ranked list of best parking options matching the criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingRecommendation'
              examples:
                results:
                  value:
                  - parkingSpotId: 101
                    zoneId: Z-CENTRO
                    location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                    spotType: standard
                    pricePerHour: 1.0
                    congestionLevel: medium
                    distanceFromTarget: same
                    score: 82.0
                  - parkingSpotId: 107
                    zoneId: Z-SUD
                    location: Parcheggio Viale dei Rettori, Stallo D04, Benevento
                    spotType: standard
                    pricePerHour: 0.5
                    congestionLevel: low
                    distanceFromTarget: adjacent
                    score: 74.0
                no_results:
                  value: []
  /city/mobility/best-charging:
    get:
      description: Finds and ranks available EV charging stations based on proximity to a target zone, required charging speed, and price. Resolves queries like "find a rapid charger near the historic center".
      summary: Find best available EV charging station for a goal
      x-microcks-operation:
        dispatcher: RANDOM
      parameters:
      - name: nearZoneId
        in: query
        schema:
          type: string
        description: Target zone the user wants to reach or is currently in
        examples:
          near_centro:
            value: Z-CENTRO
      - name: minChargingSpeed
        in: query
        schema:
          type: string
          enum:
          - slow
          - fast
          - rapid
          - ultra_rapid
        description: Minimum required charging speed
        examples:
          rapid:
            value: rapid
      - name: maxPricePerKWh
        in: query
        schema:
          type: number
        description: Maximum acceptable price per kWh
        examples:
          max_price:
            value: 0.6
      responses:
        '200':
          description: Ranked list of available charging stations matching the criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChargingRecommendation'
              examples:
                results:
                  value:
                  - stationId: 1
                    zoneId: Z-CENTRO
                    location: Parcheggio Via Vittorio Veneto, Benevento
                    chargingSpeed: fast
                    availableConnectors: 3
                    pricePerKWh: 0.45
                    congestionLevel: medium
                    score: 78.0
                  - stationId: 3
                    zoneId: Z-EST
                    location: Terminal Bus Extraurbani, Piazzale Venanzio Vari, Benevento
                    chargingSpeed: ultra_rapid
                    availableConnectors: 6
                    pricePerKWh: 0.75
                    congestionLevel: low
                    score: 71.0
  /city/tourism/best-attraction:
    get:
      description: 'Recommends tourist attractions based on real-time conditions: crowd levels, wait times, accessibility requirements, ticket price, category, and environmental quality in the attraction zone. Resolves queries like "which attraction has the shortest wait right now?".'
      summary: Recommend the best attraction to visit right now
      x-microcks-operation:
        dispatcher: RANDOM
      parameters:
      - name: category
        in: query
        schema:
          type: string
        description: Filter by attraction category (e.g., museum, archaeological, park)
        examples:
          museum:
            value: museum
      - name: maxWaitMinutes
        in: query
        schema:
          type: integer
        description: Maximum acceptable waiting time in minutes
        examples:
          max_15min:
            value: 15
      - name: maxTicketPriceEur
        in: query
        schema:
          type: number
        description: Maximum acceptable ticket price in euros
        examples:
          max_5eur:
            value: 5.0
      - name: wheelchairAccessible
        in: query
        schema:
          type: boolean
        description: If true, return only wheelchair-accessible attractions
        examples:
          accessible:
            value: true
      - name: requireCleanAir
        in: query
        schema:
          type: boolean
        description: If true, exclude attractions in zones with active air quality alerts
        examples:
          clean_air:
            value: true
      responses:
        '200':
          description: Ranked list of recommended attractions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttractionRecommendation'
              examples:
                results:
                  value:
                  - attractionId: 3
                    name: Rocca dei Rettori
                    zoneId: Z-CENTRO
                    category: palace
                    waitingTimeMinutes: 5
                    currentVisitors: 28
                    maxCapacity: 80
                    ticketPriceEur: 5.0
                    wheelchairAccessible: true
                    airQualityIndex: 42.0
                    parkingSpotsNearby: 12
                    alertsInZone: 0
                    score: 91.0
                  - attractionId: 1
                    name: Arco di Traiano
                    zoneId: Z-CENTRO
                    category: archaeological
                    waitingTimeMinutes: 0
                    currentVisitors: 42
                    maxCapacity: 200
                    ticketPriceEur: 0.0
                    wheelchairAccessible: true
                    airQualityIndex: 42.0
                    parkingSpotsNearby: 12
                    alertsInZone: 0
                    score: 88.0
                no_results:
                  value: []
  /city/maintenance/urgent:
    get:
      description: 'Aggregates urgent maintenance needs across all city infrastructure domains: overflowing bins, malfunctioning lights, offline sensors, buildings in maintenance or evacuated status, and open unresolved citizen reports.'
      summary: Get all infrastructure items requiring urgent attention
      x-microcks-operation:
        dispatcher: RANDOM
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
      - name: domain
        in: query
        schema:
          type: string
          enum:
          - bins
          - lights
          - sensors
          - buildings
          - reports
          - all
        description: Restrict results to a specific infrastructure domain
        examples:
          bins_only:
            value: bins
      - name: severity
        in: query
        schema:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        description: Minimum severity threshold
        examples:
          high_only:
            value: high
      responses:
        '200':
          description: Aggregated list of urgent maintenance items
          content:
            application/json:
              schema:
                type: object
                properties:
                  bins:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceItem'
                  lights:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceItem'
                  sensors:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceItem'
                  buildings:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceItem'
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceItem'
                  totalItems:
                    type: integer
              examples:
                urgent_items:
                  value:
                    bins:
                    - domain: bins
                      itemId: 2
                      zoneId: Z-NORD
                      location: Piazza Risorgimento, Benevento
                      issue: status=full, fillLevel=92%
                      severity: high
                    - domain: bins
                      itemId: 3
                      zoneId: Z-SUD
                      location: Villa Comunale, Viale dei Rettori, Benevento
                      issue: status=overflowing, fillLevel=100%
                      severity: critical
                    lights:
                    - domain: lights
                      itemId: 105
                      zoneId: Z-SUD
                      location: Via Mustilli - Palo 3, Benevento
                      issue: status=malfunctioning
                      severity: medium
                    sensors:
                    - domain: sensors
                      itemId: 5
                      zoneId: Z-NORD
                      location: Via Posillipo, Benevento
                      issue: alertActive=true, alertReason=HIGH_POLLUTION
                      severity: critical
                    buildings: []
                    reports:
                    - domain: reports
                      itemId: 1
                      zoneId: Z-CENTRO
                      location: Piazza Castello, Benevento
                      issue: status=open, category=sanitation
                      severity: medium
                    totalItems: 5
                no_issues:
                  value:
                    bins: []
                    lights: []
                    sensors: []
                    buildings: []
                    reports: []
                    totalItems: 0
  /register:
    post:
      description: Register this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
