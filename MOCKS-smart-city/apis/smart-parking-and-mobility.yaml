  /parking-spot/{id}:
    get:
      description: Retrieve the current availability and details of a specific parking spot by ID.
      summary: Get parking spot details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          spot_101:
            value: 101
      responses:
        '200':
          description: Parking spot details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                spot_101:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                    available: true
                    spotType: standard
                    pricePerHour: 1.0
                    status: free
                    lastUpdated: '2025-09-25T10:00:00Z'
        '404':
          description: Parking spot not found
    put:
      description: Update the status or configuration of a specific parking spot by ID.
      summary: Update parking spot by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewParkingSpot'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                  available: false
                  spotType: standard
                  pricePerHour: 1.0
                  status: occupied
                  lastUpdated: '2025-09-25T11:15:00Z'
      responses:
        '200':
          description: Parking spot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                updated:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                    available: false
                    spotType: standard
                    pricePerHour: 1.0
                    status: occupied
                    lastUpdated: '2025-09-25T11:15:00Z'
        '404':
          description: Parking spot not found
    delete:
      description: Remove a specific parking spot from the city mobility registry.
      summary: Delete parking spot by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 101
      responses:
        '204':
          description: Deleted successfully
        '404':
          description: Parking spot not found
  /parking-spot/zone/{zoneId}/pricing:
    put:
      description: Dynamically adjust the hourly parking rate for all spots in a specific zone. Useful for reacting to traffic congestion or pollution alerts by incentivizing or discouraging parking in a given area.
      summary: Update pricing for an entire zone
      parameters:
      - name: zoneId
        in: path
        required: true
        schema:
          type: string
        examples:
          zone_centro:
            value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPricePerHour:
                  type: number
                  format: float
                  description: The new hourly rate to apply to all spots in the zone
                reason:
                  type: string
                  description: Reason for the price update (e.g., HIGH_POLLUTION_INCENTIVE, CONGESTION_CHARGE)
            examples:
              smog_discount:
                value:
                  newPricePerHour: 0.5
                  reason: HIGH_POLLUTION_INCENTIVE
              congestion_charge:
                value:
                  newPricePerHour: 3.0
                  reason: PEAK_HOUR_CONGESTION_CHARGE
      responses:
        '200':
          description: Zone pricing updated successfully
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: Zone pricing updated
  /register:
    post:
      description: Register this service to the discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
