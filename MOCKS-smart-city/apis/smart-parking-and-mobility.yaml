openapi: 3.0.2
info:
  title: Smart Parking and Mobility API
  version: '1.0'
  description: API for managing parking spots, lots, and dynamic pricing across the city. Supports searching for available spots by standardized city zones (zoneId) and spot type. Supports multi-zone queries (zoneIds) to find parking across all zones returned by a previous task (e.g., all zones where tourist attractions are open, or zones with low traffic congestion). Crucial for mobility orchestration and cross-domain reactions, such as dynamically discounting or raising parking prices in specific zones during traffic congestion or pollution events.
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Parking+and+Mobility+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    ParkingSpot:
      allOf:
      - $ref: '#/components/schemas/NewParkingSpot'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the parking spot
        required:
        - id
    NewParkingSpot:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location or parking lot name of the spot
        available:
          type: boolean
          description: Whether the spot is currently available
        spotType:
          type: string
          enum:
          - standard
          - disabled
          - electric
          - motorcycle
          - reserved
          description: Type of parking spot
        pricePerHour:
          type: number
          format: float
          description: Hourly parking rate in local currency
        status:
          type: string
          enum:
          - free
          - occupied
          - reserved
          - maintenance
          description: Current operational status of the parking spot
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last status update
      required:
      - zoneId
      - location
      - available
      - spotType
      - pricePerHour
      - status
      - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Parking microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /parking-spot:
    get:
      description: "Retrieve parking spots registered in the city. Use query parameters to filter by zone, multiple zones, availability, spot type or status - for example to find all free disabled spots in Z-CENTRO, all available electric spots for EV drivers, or all free spots across every zone where tourist attractions are currently open.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search parking spots
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "available", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: zoneIds
        in: query
        schema:
          type: array
          items:
            type: string
            enum:
            - Z-CENTRO
            - Z-NORD
            - Z-SUD
            - Z-EST
            - Z-OVEST
        style: form
        explode: false
        description: 'Multiple city zones, comma-separated. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST. Example: Z-CENTRO,Z-NORD,Z-SUD.'
        examples:
          multiple_zones:
            value: Z-CENTRO,Z-NORD
          three_zones:
            value: Z-CENTRO,Z-NORD,Z-SUD
      - name: available
        in: query
        schema:
          type: boolean
        description: Filter by availability (true = show only free spots)
        examples:
          available_true:
            value: true
          available_false:
            value: false
      - name: spotType
        in: query
        schema:
          type: string
          enum:
          - standard
          - disabled
          - electric
          - motorcycle
          - reserved
        description: Filter by spot type - use 'disabled' for accessibility, 'electric' for EV charging
        examples:
          by_type_disabled:
            value: disabled
          by_type_electric:
            value: electric
      - name: status
        in: query
        schema:
          type: string
          enum:
          - free
          - occupied
          - reserved
          - maintenance
        description: Filter by operational status
        examples:
          by_status_free:
            value: free
      responses:
        '200':
          description: List of parking spots matching the specified filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingSpot'
              examples:
                example_list:
