openapi: 3.0.2
info:
  title: Smart Buildings API
  version: '1.0'
  description: API for managing building data and facilities in the city. Supports creation, lookup, update, and deletion of building entries, including occupancy, energy usage, CO2 emissions, and structural metadata. Supports filtering by standardized city zones (zoneId), building type, and operational status, enabling cross-domain orchestration such as identifying high energy-consumption buildings in a zone with active pollution alerts, or finding evacuated buildings during emergencies.
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Buildings+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Building:
      allOf:
      - $ref: '#/components/schemas/NewBuilding'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the building
        required:
        - id
    NewBuilding:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        name:
          type: string
          description: Official name of the building
        address:
          type: string
          description: Full postal address of the building
        buildingType:
          type: string
          enum:
          - office
          - residential
          - public
          - commercial
          - industrial
          - healthcare
          - education
          description: Functional category of the building
        floors:
          type: integer
          description: Total number of floors in the building
        occupancy:
          type: integer
          description: Current number of occupants
        maxCapacity:
          type: integer
          description: Maximum allowed occupancy
        energyUsage:
          type: number
          format: float
          description: Current energy consumption in kWh
        co2Emissions:
          type: number
          format: float
          description: Estimated CO2 emissions in kg/h based on current energy usage
        status:
          type: string
          enum:
          - operational
          - maintenance
          - closed
          - evacuated
          description: Current operational status of the building
      required:
      - zoneId
      - name
      - address
      - buildingType
      - floors
      - occupancy
      - maxCapacity
      - energyUsage
      - co2Emissions
      - status
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Buildings API service is running and responsive.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /building:
    get:
      description: "Retrieve the list of registered city buildings. Use query parameters to filter by zone, building type, or operational status - for example, to find all healthcare buildings in Z-NORD, or all evacuated buildings during an emergency, or all buildings currently in maintenance.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search buildings
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "status", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: status
        in: query
        schema:
          type: string
          enum:
          - operational
          - maintenance
          - closed
          - evacuated
        description: Filter buildings by operational status
        examples:
          by_status_evacuated:
            value: evacuated
      - name: buildingType
        in: query
        schema:
          type: string
          enum:
          - office
          - residential
          - public
          - commercial
          - industrial
          - healthcare
          - education
        description: Filter buildings by functional type
