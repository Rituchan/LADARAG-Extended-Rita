    post:
      description: Register a new building in the city infrastructure system.
      summary: Register new building
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBuilding'
            examples:
              new_building:
                value:
                  zoneId: Z-CENTRO
                  name: Centro Polifunzionale Santa Sofia
                  address: Via Carlo Torre 1, Benevento
                  buildingType: public
                  floors: 2
                  occupancy: 30
                  maxCapacity: 150
                  energyUsage: 500.0
                  co2Emissions: 20.0
                  status: operational
      responses:
        '201':
          description: Building created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
              examples:
                created:
                  value:
                    id: 3
                    zoneId: Z-CENTRO
                    name: Centro Polifunzionale Santa Sofia
                    address: Via Carlo Torre 1, Benevento
                    buildingType: public
                    floors: 2
                    occupancy: 30
                    maxCapacity: 150
                    energyUsage: 500.0
                    co2Emissions: 20.0
                    status: operational
  /building/{id}:
    get:
      description: Retrieve full details of a specific building by ID.
      summary: Get building details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          building_1:
            value: 1
      responses:
        '200':
          description: Building details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
              examples:
                building_1:
                  value:
                    id: 1
                    zoneId: Z-SUD
                    name: Ospedale San Pio
                    address: Via dell'Esperanto 1, Benevento
                    buildingType: healthcare
                    floors: 6
                    occupancy: 850
                    maxCapacity: 1500
                    energyUsage: 5500.0
                    co2Emissions: 220.0
                    status: operational
        '404':
          description: Building not found
    put:
      description: Update the data of a specific building by ID.
      summary: Update building details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBuilding'
            examples:
              update:
                value:
                  zoneId: Z-SUD
                  name: Ospedale San Pio
                  address: Via dell'Esperanto 1, Benevento
                  buildingType: healthcare
                  floors: 6
                  occupancy: 900
                  maxCapacity: 1500
                  energyUsage: 5800.0
                  co2Emissions: 232.0
                  status: operational
      responses:
        '200':
          description: Building updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-SUD
                    name: Ospedale San Pio
                    address: Via dell'Esperanto 1, Benevento
                    buildingType: healthcare
                    floors: 6
                    occupancy: 900
                    maxCapacity: 1500
                    energyUsage: 5800.0
                    co2Emissions: 232.0
                    status: operational
        '404':
          description: Building not found
    delete:
      description: Permanently remove a specific building from the city registry.
      summary: Delete building by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Building deleted
        '404':
          description: Building not found
  /register:
    post:
      description: Register this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
