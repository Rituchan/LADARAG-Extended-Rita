openapi: 3.0.2
info:
  title: Smart Buildings API
  version: '1.0'
  description: 'Smart Buildings API for managing building data and facilities in the
    city. Compatible with the City Infrastructure System, this service allows interaction
    with building references.

    Supports creation, lookup, update, and deletion of building entries, including
    occupancy, energy usage, and structural metadata.'
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Buildings+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Building:
      allOf:
      - $ref: '#/components/schemas/NewBuilding'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the building
        required:
        - id
    NewBuilding:
      type: object
      properties:
        name:
          type: string
          description: Name of the building
        address:
          type: string
          description: Full postal address of the building
        buildingType:
          type: string
          enum:
          - office
          - residential
          - public
          - commercial
          - industrial
          - healthcare
          - education
          description: Functional category of the building
        floors:
          type: integer
          description: Total number of floors in the building
        occupancy:
          type: integer
          description: Current number of occupants
        maxCapacity:
          type: integer
          description: Maximum allowed occupancy
        energyUsage:
          type: number
          format: float
          description: Current energy consumption in kWh
        co2Emissions:
          type: number
          format: float
          description: Estimated CO2 emissions in kg/h based on current energy usage
        status:
          type: string
          enum:
          - operational
          - maintenance
          - closed
          - evacuated
          description: Operational status of the building
      required:
      - name
      - address
      - buildingType
      - floors
      - occupancy
      - maxCapacity
      - energyUsage
      - co2Emissions
      - status
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Buildings API service is running and responsive
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /building:
    get:
      description: Retrieve the list of all registered city buildings, including occupancy,
        energy usage, CO2 emissions and operational status
      summary: List all buildings
      responses:
        '200':
          description: List of all buildings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Building'
              examples:
                example_list:
                  value:
                  - &id001
                    id: 1
                    name: Ospedale San Pio
                    address: Via dell'Esperanto 1, Benevento
                    buildingType: healthcare
                    floors: 6
                    occupancy: 850
                    maxCapacity: 1500
                    energyUsage: 5500.0
                    co2Emissions: 220.0
                    status: operational
                  - id: 2
                    name: Biblioteca Comunale - Palazzo Paolo V
                    address: Corso Garibaldi 147, Benevento
                    buildingType: public
                    floors: 3
                    occupancy: 45
                    maxCapacity: 200
                    energyUsage: 350.0
                    co2Emissions: 14.0
                    status: operational
    post:
      description: Register a new building in the city infrastructure system, specifying
        type, capacity, energy profile and current status
      summary: Register new building
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBuilding'
            examples:
              new_building:
                value:
                  name: Rocca dei Rettori
                  address: Piazza Castello, Benevento
                  buildingType: public
                  floors: 4
                  occupancy: 30
                  maxCapacity: 150
                  energyUsage: 420.0
                  co2Emissions: 16.8
                  status: operational
      responses:
        '201':
          description: Building created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
              examples:
                created:
                  value:
                    id: 3
                    name: Rocca dei Rettori
                    address: Piazza Castello, Benevento
                    buildingType: public
                    floors: 4
                    occupancy: 30
                    maxCapacity: 150
                    energyUsage: 420.0
                    co2Emissions: 16.8
                    status: operational
  /building/{id}:
    get:
      description: Retrieve full details of a specific city building by its ID, including
        energy consumption, occupancy and CO2 emissions
      summary: Get building details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          building_1:
            value: 1
      responses:
        '200':
          description: Building details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
              examples:
                building_1:
                  value: *id001
        '404':
          description: Building not found
    put:
      description: Update the data of a specific building by ID, such as occupancy
        count, energy usage, CO2 emissions or operational status
      summary: Update building details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBuilding'
            examples:
              update:
                value:
                  name: Ospedale San Pio
                  address: Via dell'Esperanto 1, Benevento
                  buildingType: healthcare
                  floors: 6
                  occupancy: 900
                  maxCapacity: 1500
                  energyUsage: 5800.0
                  co2Emissions: 232.0
                  status: operational
      responses:
        '200':
          description: Building updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
              examples:
                updated:
                  value:
                    id: 1
                    name: Ospedale San Pio
                    address: Via dell'Esperanto 1, Benevento
                    buildingType: healthcare
                    floors: 6
                    occupancy: 900
                    maxCapacity: 1500
                    energyUsage: 5800.0
                    co2Emissions: 232.0
                    status: operational
        '404':
          description: Building not found
    delete:
      description: Remove a specific building from the city infrastructure registry
        by its ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Building deleted
        '404':
          description: Building not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service to Consul

      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul