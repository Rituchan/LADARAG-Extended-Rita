openapi: 3.0.2
info:
  title: Smart Tourist Attractions API
  version: '1.0'
  description: |-
    Smart Tourist Attractions API for managing, monitoring, and providing real-time data on city landmarks, museums, and historical sites. 
    
    Seamlessly integrated with the City Tourism Board, this service allows client applications (such as digital totems and tourist mobile apps) to track current visitor counts, enforce maximum capacity limits for heritage preservation, and broadcast estimated queue wait times. It ensures an optimized and safe cultural experience for visitors in Benevento.
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Tourist+Attractions+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    Attraction:
      allOf:
        - $ref: '#/components/schemas/NewAttraction'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique, auto-generated database identifier for the tourist attraction.
          required:
            - id
    NewAttraction:
      type: object
      properties:
        name:
          type: string
          description: Official, globally recognized name of the historical site, museum, or point of interest.
        category:
          type: string
          enum: [archaeological, museum, church, palace, park, monument, theatre, other]
          description: Architectural or cultural classification of the attraction to aid in tourist app filtering.
        address:
          type: string
          description: Precise geographical location or street address within the city.
        openingTime:
          type: string
          description: Daily opening time in HH:MM format (24h clock) based on the local timezone (CET/CEST).
        closingTime:
          type: string
          description: Daily closing time in HH:MM format (24h clock) based on the local timezone.
        ticketPriceEur:
          type: number
          format: float
          description: Standard adult admission price in EUR. A value of 0.0 indicates free public entry.
        currentVisitors:
          type: integer
          description: Real-time count of active visitors currently inside the premises, typically updated via IoT turnstiles or ticketing systems.
        maxCapacity:
          type: integer
          description: Maximum allowed simultaneous occupancy dictated by safety regulations and structural preservation constraints.
        waitingTimeMinutes:
          type: integer
          description: Dynamically calculated estimated queue wait time in minutes, based on current crowd density and average visit duration.
        wheelchairAccessible:
          type: boolean
          description: Flag indicating if the attraction features ramps, elevators, or paths suitable for visitors with mobility impairments.
        availableLanguages:
          type: array
          items:
            type: string
          description: List of ISO 639-1 language codes indicating available guided tours, informational plaques, or audio guides (e.g., ['it', 'en']).
        status:
          type: string
          enum: [open, closed, temporarily_closed, special_event]
          description: Current operational status (e.g., 'temporarily_closed' may trigger when maxCapacity is reached).
        lastUpdated:
          type: string
          format: date-time
          description: ISO-8601 timestamp of the last telemetry and crowd data update.
      required:
        - name
        - category
        - address
        - openingTime
        - closingTime
        - ticketPriceEur
        - currentVisitors
        - maxCapacity
        - waitingTimeMinutes
        - wheelchairAccessible
        - availableLanguages
        - status
        - lastUpdated
paths:
  /health:
    get:
      description: Performs a lightweight health check to verify that the Tourist Attractions microservice is fully operational and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /attraction:
    get:
      description: Retrieves a comprehensive catalog of all tourist attractions in the city, providing an overview of current crowds, wait times, and accessibility data.
      summary: List all tourist attractions
      responses:
        "200":
          description: A JSON array containing the collection of tourist attractions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attraction'
              examples:
                example_list:
                  value:
                    - id: 1
                      name: "Arco di Traiano"
                      category: "archaeological"
                      address: "Via Traiano, Benevento"
                      openingTime: "09:00"
                      closingTime: "19:00"
                      ticketPriceEur: 0.0
                      currentVisitors: 42
                      maxCapacity: 200
                      waitingTimeMinutes: 0
                      wheelchairAccessible: true
                      availableLanguages: ["it", "en", "fr"]
                      status: "open"
                      lastUpdated: "2026-03-09T10:10:00Z"
                    - id: 2
                      name: "Teatro Romano di Benevento"
                      category: "archaeological"
                      address: "Piazza Ponzio Telesino, Benevento"
                      openingTime: "09:00"
                      closingTime: "20:00"
                      ticketPriceEur: 3.0
                      currentVisitors: 85
                      maxCapacity: 150
                      waitingTimeMinutes: 12
                      wheelchairAccessible: false
                      availableLanguages: ["it", "en"]
                      status: "open"
                      lastUpdated: "2026-03-09T10:08:00Z"
    post:
      description: Registers a newly monitored tourist attraction into the city's tourism ecosystem, establishing its baseline configuration and capacity limits.
      summary: Register new tourist attraction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAttraction'
            examples:
              new_attraction:
                value:
                  name: "Rocca dei Rettori"
                  category: "palace"
                  address: "Piazza Castello, Benevento"
                  openingTime: "10:00"
                  closingTime: "18:00"
                  ticketPriceEur: 5.0
                  currentVisitors: 0
                  maxCapacity: 80
                  waitingTimeMinutes: 0
                  wheelchairAccessible: true
                  availableLanguages: ["it", "en"]
                  status: "open"
                  lastUpdated: "2026-03-09T10:00:00Z"
      responses:
        "201":
          description: Tourist attraction successfully registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'
              examples:
                created:
                  value:
                    id: 3
                    name: "Rocca dei Rettori"
                    category: "palace"
                    address: "Piazza Castello, Benevento"
                    openingTime: "10:00"
                    closingTime: "18:00"
                    ticketPriceEur: 5.0
                    currentVisitors: 0
                    maxCapacity: 80
                    waitingTimeMinutes: 0
                    wheelchairAccessible: true
                    availableLanguages: ["it", "en"]
                    status: "open"
                    lastUpdated: "2026-03-09T10:00:00Z"
  /attraction/{id}:
    get:
      description: Fetches the real-time details and telemetry (such as queue duration and crowd density) of a specific tourist attraction using its unique ID.
      summary: Get tourist attraction details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            attraction_1:
              value: 1
      responses:
        "200":
          description: Detailed information regarding the requested attraction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'
              examples:
                attraction_1:
                  value:
                    id: 1
                    name: "Arco di Traiano"
                    category: "archaeological"
                    address: "Via Traiano, Benevento"
                    openingTime: "09:00"
                    closingTime: "19:00"
                    ticketPriceEur: 0.0
                    currentVisitors: 42
                    maxCapacity: 200
                    waitingTimeMinutes: 0
                    wheelchairAccessible: true
                    availableLanguages: ["it", "en", "fr"]
                    status: "open"
                    lastUpdated: "2026-03-09T10:10:00Z"
        "404":
          description: The specified attraction ID does not exist in the database.
    put:
      description: Updates the real-time data of an attraction. Designed to be called frequently by IoT turnstiles or manual staff inputs to refresh visitor counts and wait times.
      summary: Update tourist attraction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAttraction'
            examples:
              update:
                value:
                  name: "Arco di Traiano"
                  category: "archaeological"
                  address: "Via Traiano, Benevento"
                  openingTime: "09:00"
                  closingTime: "19:00"
                  ticketPriceEur: 0.0
                  currentVisitors: 78
                  maxCapacity: 200
                  waitingTimeMinutes: 8
                  wheelchairAccessible: true
                  availableLanguages: ["it", "en", "fr"]
                  status: "open"
                  lastUpdated: "2026-03-09T11:00:00Z"
      responses:
        "200":
          description: Attraction data successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'
              examples:
                updated:
                  value:
                    id: 1
                    name: "Arco di Traiano"
                    category: "archaeological"
                    address: "Via Traiano, Benevento"
                    openingTime: "09:00"
                    closingTime: "19:00"
                    ticketPriceEur: 0.0
                    currentVisitors: 78
                    maxCapacity: 200
                    waitingTimeMinutes: 8
                    wheelchairAccessible: true
                    availableLanguages: ["it", "en", "fr"]
                    status: "open"
                    lastUpdated: "2026-03-09T11:00:00Z"
        "404":
          description: The specified attraction ID was not found.
    delete:
      description: Permanently removes a specific attraction from the tourism registry.
      summary: Delete tourist attraction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        "204":
          description: The attraction was successfully deleted. No content is returned.
          content:
            text/plain:
              examples:
                deleted:
                  value: "Tourist attraction deleted"
        "404":
          description: The specified attraction ID was not found.
  /register:
    post:
      description: Registers this microservice with the central discovery registry (e.g., Consul) to enable seamless routing and integration with other Smart City modules.
      summary: Register service with discovery system
      responses:
        "200":
          description: Service successfully registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: "success"
                    httpCode: 200
                    message: "Service registered"
        "500":
          description: Internal server error preventing successful registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: "error"
                    httpCode: 500
                    message: "Unable to register to Consul"