  /attraction/{id}:
    get:
      description: Fetches the real-time details and telemetry of a specific tourist attraction using its unique ID.
      summary: Get tourist attraction details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          attraction_1:
            value: 1
      responses:
        '200':
          description: Detailed information regarding the requested attraction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'
              examples:
                attraction_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    name: Arco di Traiano
                    category: archaeological
                    address: Via Traiano, Benevento
                    openingTime: 09:00
                    closingTime: '19:00'
                    ticketPriceEur: 0.0
                    currentVisitors: 42
                    maxCapacity: 200
                    waitingTimeMinutes: 0
                    wheelchairAccessible: true
                    availableLanguages:
                    - it
                    - en
                    - fr
                    status: open
                    lastUpdated: '2026-03-09T10:10:00Z'
        '404':
          description: The specified attraction ID does not exist in the database.
