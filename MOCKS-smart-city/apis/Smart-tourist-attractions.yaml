openapi: 3.0.2
info:
  title: Smart Tourist Attractions API
  version: '1.0'
  description: 'Smart Tourist Attractions API for managing, monitoring, and providing real-time data on city landmarks, museums, and historical sites. Designed for cross-domain orchestration: supports filtering by standardized city zones (zoneId), category, operational status, and accessibility requirements. Allows automated emergency responses such as temporarily closing all attractions in a specific zone due to severe weather or traffic gridlock. Supports accessibility-aware queries to find wheelchair-friendly attractions with short wait times.'
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Tourist+Attractions+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Attraction:
      allOf:
      - $ref: '#/components/schemas/NewAttraction'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique, auto-generated database identifier for the tourist attraction.
        required:
        - id
    NewAttraction:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier where the attraction is located (e.g., Z-CENTRO, Z-NORD)
        name:
          type: string
          description: Official name of the historical site, museum, or point of interest.
        category:
          type: string
          enum:
          - archaeological
          - museum
          - church
          - palace
          - park
          - monument
          - theatre
          - other
          description: Architectural or cultural classification of the attraction.
        address:
          type: string
          description: Precise street address within the city.
        openingTime:
          type: string
          description: Daily opening time in HH:MM format (24h clock).
        closingTime:
          type: string
          description: Daily closing time in HH:MM format (24h clock).
        ticketPriceEur:
          type: number
          format: float
          description: Standard adult admission price in EUR. A value of 0.0 indicates free entry.
        currentVisitors:
          type: integer
          description: Real-time count of visitors currently inside the premises.
        maxCapacity:
          type: integer
          description: Maximum allowed simultaneous occupancy.
        waitingTimeMinutes:
          type: integer
          description: Estimated queue wait time in minutes based on current crowd density.
        wheelchairAccessible:
          type: boolean
          description: True if the attraction features ramps, elevators, or paths suitable for mobility-impaired visitors.
        availableLanguages:
          type: array
          items:
            type: string
          description: List of ISO 639-1 language codes for available guided tours or audio guides (e.g., ['it', 'en']).
        status:
          type: string
          enum:
          - open
          - closed
          - temporarily_closed
          - special_event
          description: Current operational status.
        lastUpdated:
          type: string
          format: date-time
          description: ISO-8601 timestamp of the last telemetry and crowd data update.
      required:
      - zoneId
      - name
      - category
      - address
      - openingTime
      - closingTime
      - ticketPriceEur
      - currentVisitors
      - maxCapacity
      - waitingTimeMinutes
      - wheelchairAccessible
      - availableLanguages
      - status
      - lastUpdated
paths:
  /health:
    get:
      description: Performs a lightweight health check to verify that the Tourist Attractions microservice is fully operational and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /attraction:
    get:
      description: "Retrieves a catalog of tourist attractions in the city. Use query parameters to filter by zone, category, operational status, or accessibility - for example to find all open museums in Z-CENTRO, all wheelchair-accessible attractions, or all currently closed sites during an emergency.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search tourist attractions
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "status", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: category
        in: query
        schema:
          type: string
          enum:
          - archaeological
          - museum
          - church
          - palace
          - park
          - monument
          - theatre
          - other
        description: Filter by attraction category
        examples:
          by_category_museum:
            value: museum
          by_category_church:
            value: church
          by_category_theatre:
            value: theatre
          by_category_monument:
            value: monument
          by_category_palace:
            value: palace
          by_category_park:
            value: park
      - name: status
        in: query
        schema:
          type: string
          enum:
          - open
          - closed
          - temporarily_closed
          - special_event
        description: Filter by current operational status
        examples:
          by_status_open:
            value: open
          by_status_temporarily_closed:
            value: temporarily_closed
          by_status_special_event:
            value: special_event
      - name: wheelchairAccessible
        in: query
        schema:
          type: boolean
        description: Filter by accessibility - use true to find only attractions suitable for visitors with mobility impairments (ramps, elevators, accessible paths)
        examples:
          accessible_only:
            value: true
      responses:
        '200':
          description: List of tourist attractions matching the specified filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attraction'
