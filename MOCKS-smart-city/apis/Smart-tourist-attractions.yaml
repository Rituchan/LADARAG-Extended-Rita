  /attraction/zone/{zoneId}/status:
    put:
      description: Dynamically update the operational status of all tourist attractions in a specific zone. Extremely useful for emergency evacuations, severe weather closures, or city-wide special events.
      summary: Set status for all attractions in a zone
      parameters:
      - name: zoneId
        in: path
        required: true
        schema:
          type: string
        examples:
          zone_centro:
            value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newStatus:
                  type: string
                  enum:
                  - open
                  - closed
                  - temporarily_closed
                  - special_event
                  description: The new operational status to apply to all attractions in the zone
                reason:
                  type: string
                  description: Reason for the mass status update (e.g., SEVERE_WEATHER, SECURITY_THREAT)
            examples:
              emergency_closure:
                value:
                  newStatus: temporarily_closed
                  reason: SEVERE_WEATHER_WARNING
      responses:
        '200':
          description: Zone attraction status successfully updated.
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: Zone attraction status updated
  /register:
    post:
      description: Register this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
