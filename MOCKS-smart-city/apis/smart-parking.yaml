openapi: 3.0.2
info:
  title: Smart Parking API
  version: '1.0'
  description: 'Smart Parking API for managing parking spots and lots across the city. Compatible with the City Mobility System, this service allows interaction with parking spot references.

    Supports creation, lookup, update, and deletion of parking spots, including real-time availability and reservation status.'
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Parking+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    ParkingSpot:
      allOf:
        - $ref: '#/components/schemas/NewParkingSpot'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the parking spot
          required:
            - id
    NewParkingSpot:
      type: object
      properties:
        location:
          type: string
          description: Physical location or parking lot name of the spot
        available:
          type: boolean
          description: Whether the spot is currently available
        spotType:
          type: string
          enum:
            - standard
            - disabled
            - electric
            - motorcycle
            - reserved
          description: Type of parking spot
        pricePerHour:
          type: number
          format: float
          description: Hourly parking rate in local currency
        status:
          type: string
          enum:
            - free
            - occupied
            - reserved
            - maintenance
          description: Current operational status of the parking spot
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last status update
      required:
        - location
        - available
        - spotType
        - pricePerHour
        - status
        - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Parking microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /parking-spot:
    get:
      description: Retrieve all parking spots registered in the city, including availability, type (standard, disabled, electric, motorcycle, reserved), price per hour and current status
      summary: List all parking spots
      responses:
        '200':
          description: List of all parking spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingSpot'
              examples:
                example_list:
                  value:
                    - id: 1
                      location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                      available: true
                      spotType: standard
                      pricePerHour: 1.0
                      status: free
                      lastUpdated: '2025-09-25T10:00:00Z'
                    - id: 2
                      location: Parcheggio Via del Pomerio (Arco di Traiano), Stallo B03, Benevento
                      available: false
                      spotType: disabled
                      pricePerHour: 0.0
                      status: occupied
                      lastUpdated: '2025-09-25T09:30:00Z'
    post:
      description: Register a new parking spot in the city mobility system, specifying location, spot type, hourly price and current availability
      summary: Register new parking spot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewParkingSpot'
            examples:
              new_spot:
                value:
                  location: Parcheggio Viale Mellusi, Stallo C05, Benevento
                  available: true
                  spotType: electric
                  pricePerHour: 1.5
                  status: free
                  lastUpdated: '2025-09-25T11:00:00Z'
      responses:
        '201':
          description: Parking spot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                created:
                  value:
                    id: 3
                    location: Parcheggio Viale Mellusi, Stallo C05, Benevento
                    available: true
                    spotType: electric
                    pricePerHour: 1.5
                    status: free
                    lastUpdated: '2025-09-25T11:00:00Z'
  /parking-spot/{id}:
    get:
      description: Retrieve the current availability and details of a specific parking spot by ID, including type, price per hour and occupancy status
      summary: Get parking spot details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            spot_1:
              value: 1
      responses:
        '200':
          description: Parking spot details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                spot_1:
                  value:
                    id: 1
                    location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                    available: true
                    spotType: standard
                    pricePerHour: 1.0
                    status: free
                    lastUpdated: '2025-09-25T10:00:00Z'
        '404':
          description: Parking spot not found
    put:
      description: Update the status or configuration of a specific parking spot by ID, such as availability, occupancy status, price per hour or spot type
      summary: Update parking spot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewParkingSpot'
            examples:
              update:
                value:
                  location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                  available: false
                  spotType: standard
                  pricePerHour: 1.0
                  status: occupied
                  lastUpdated: '2025-09-25T11:15:00Z'
      responses:
        '200':
          description: Parking spot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                updated:
                  value:
                    id: 1
                    location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                    available: false
                    spotType: standard
                    pricePerHour: 1.0
                    status: occupied
                    lastUpdated: '2025-09-25T11:15:00Z'
        '404':
          description: Parking spot not found
    delete:
      description: Remove a specific parking spot from the city mobility registry by its ID
      summary: Delete parking spot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Parking spot deleted
        '404':
          description: Parking spot not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
