openapi: 3.0.2
info:
  title: Smart Lighting and Energy API
  version: '1.0'
  description: API for managing, monitoring, and controlling the urban street lighting infrastructure. Supports zone-based control (zoneId), allowing the orchestration engine to dynamically adjust lighting brightness across entire city districts in response to traffic incidents, pedestrian density, or severe weather conditions. Supports multi-zone queries (zoneIds) to find malfunctioning lights across all zones returned by a previous task (e.g., zones with active sensor alerts).
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Lighting+and+Energy+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Light:
      allOf:
      - $ref: '#/components/schemas/NewLight'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique, auto-generated database identifier for the street light pole.
        required:
        - id
    NewLight:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Precise physical location or topographical reference of the light pole.
        status:
          type: string
          enum:
          - 'on'
          - 'off'
          - malfunctioning
          description: 'Current operational state: ''on'' = active/illuminated, ''off'' = switched off, ''malfunctioning'' = hardware failure or connectivity drop.'
        brightness:
          type: integer
          description: Current brightness level as a percentage (0 = off, 100 = maximum).
        energyConsumption:
          type: number
          format: float
          description: Accumulated energy usage in kilowatt-hours (kWh).
        smartEnabled:
          type: boolean
          description: True if the pole is equipped with autonomous smart sensors.
      required:
      - zoneId
      - location
      - status
      - brightness
      - energyConsumption
      - smartEnabled
paths:
  /health:
    get:
      description: Performs a shallow health check to verify that the Smart Lighting microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /light:
    get:
      description: "Retrieves a list of smart street lights. Use query parameters to filter by zone, multiple zones, or operational status - for example to find all malfunctioning lights in Z-CENTRO, or all offline lights across every zone that has an active environmental alert.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search smart lights
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "status", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: zoneIds
        in: query
        schema:
          type: array
          items:
            type: string
            enum:
            - Z-CENTRO
            - Z-NORD
            - Z-SUD
            - Z-EST
            - Z-OVEST
        style: form
        explode: false
        description: 'Multiple city zones, comma-separated. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST. Example: Z-CENTRO,Z-NORD,Z-SUD.'
        examples:
          multiple_zones:
            value: Z-CENTRO,Z-NORD
      - name: status
        in: query
        schema:
          type: string
          enum:
          - 'on'
          - 'off'
          - malfunctioning
        description: Filter by operational status (e.g., malfunctioning to find broken lights)
        examples:
          by_status_malfunctioning:
            value: malfunctioning
          by_status_on:
            value: 'on'
          by_status_off:
            value: 'off'
      responses:
        '200':
          description: List of smart lights matching the specified filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Light'
              examples:
                example_list:
                  value:
                  - id: 101
                    zoneId: Z-CENTRO
                    location: Corso Garibaldi - Palo 12, Benevento
                    status: 'on'
                    brightness: 80
                    energyConsumption: 1.25
                    smartEnabled: true
                  - id: 102
                    zoneId: Z-NORD
