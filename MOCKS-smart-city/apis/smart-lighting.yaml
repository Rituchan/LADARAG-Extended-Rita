                    status: 'off'
                    brightness: 0
                    energyConsumption: 0.0
                    smartEnabled: false
                  - id: 103
                    zoneId: Z-SUD
                    location: Viale dei Rettori - Palo 8, Benevento
                    status: 'on'
                    brightness: 75
                    energyConsumption: 1.1
                    smartEnabled: true
                  - id: 104
