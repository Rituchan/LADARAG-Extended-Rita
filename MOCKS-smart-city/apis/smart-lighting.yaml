openapi: 3.0.2
info:
  title: Smart Lighting API
  version: '1.0'
  description: |-
    Smart Lighting API for managing, monitoring, and controlling the urban street lighting infrastructure. Compatible with the Benevento Smart Infrastructure platform, this service allows interaction with individual light poles and lighting grids.

    It supports the creation, lookup, update, and deletion of lighting units. Key features include real-time brightness adjustment, operational status tracking (e.g., detecting malfunctions), and detailed energy consumption telemetry to optimize the city's power efficiency.
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Lighting+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    Light:
      allOf:
        - $ref: '#/components/schemas/NewLight'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique, auto-generated database identifier for the street light pole.
          required:
            - id
    NewLight:
      type: object
      properties:
        location:
          type: string
          description: Precise physical location or topographical reference of the light pole (e.g., street name, intersection, or landmark proximity).
        status:
          type: string
          enum: [on, off, malfunctioning]
          description: Current operational state of the light emitting unit. 'malfunctioning' indicates a hardware failure or connectivity drop.
        brightness:
          type: integer
          description: Current dimming or brightness level expressed as a percentage (0 = off, 100 = maximum output).
        energyConsumption:
          type: number
          format: float
          description: Accumulated energy usage in kilowatt-hours (kWh) over the current billing or monitoring cycle.
        smartEnabled:
          type: boolean
          description: Flag indicating if the pole is equipped with autonomous smart sensors (e.g., motion-based dimming, ambient light detection).
      required:
        - location
        - status
        - brightness
        - energyConsumption
        - smartEnabled
paths:
  /health:
    get:
      description: Performs a shallow health check to verify that the Smart Lighting microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /light:
    get:
      description: Retrieves a comprehensive list of all smart street lights deployed in the city, including their current telemetry, brightness, and operational status.
      summary: List all smart lights
      responses:
        "200":
          description: A JSON array containing the list of all registered smart lights.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Light'
              examples:
                example_list:
                  value:
                    - id: 101
                      location: "Corso Garibaldi - Palo 12, Benevento"
                      status: "on"
                      brightness: 80
                      energyConsumption: 1.25
                      smartEnabled: true
                    - id: 102
                      location: "Viale San Lorenzo - Palo 5, Benevento"
                      status: "off"
                      brightness: 0
                      energyConsumption: 0.0
                      smartEnabled: false
    post:
      description: Registers a newly installed smart light pole into the city's infrastructure grid, setting its initial configuration and location.
      summary: Register new smart light
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLight'
            examples:
              new_light:
                value:
                  location: "Piazza Santa Sofia - Palo 7, Benevento"
                  status: "on"
                  brightness: 90
                  energyConsumption: 1.35
                  smartEnabled: true
      responses:
        "201":
          description: Smart light successfully registered and added to the grid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                created:
                  value:
                    id: 103
                    location: "Piazza Santa Sofia - Palo 7, Benevento"
                    status: "on"
                    brightness: 90
                    energyConsumption: 1.35
                    smartEnabled: true
  /light/{id}:
    get:
      description: Fetches real-time telemetry and configuration data for a specific street light by its unique identifier.
      summary: Get smart light details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            light_101:
              value: 101
      responses:
        "200":
          description: Detailed information about the requested smart light.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                light_101:
                  value:
                    id: 101
                    location: "Corso Garibaldi - Palo 12, Benevento"
                    status: "on"
                    brightness: 80
                    energyConsumption: 1.25
                    smartEnabled: true
        "404":
          description: The specified smart light ID does not exist in the registry.
    put:
      description: Updates the configuration or status of a specific smart light (e.g., remote toggling, adjusting brightness, or flagging it for maintenance).
      summary: Update smart light by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLight'
            examples:
              update:
                value:
                  location: "Corso Garibaldi - Palo 12, Benevento"
                  status: "off"
                  brightness: 0
                  energyConsumption: 0.0
                  smartEnabled: true
      responses:
        "200":
          description: Smart light data successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                updated:
                  value:
                    id: 101
                    location: "Corso Garibaldi - Palo 12, Benevento"
                    status: "off"
                    brightness: 0
                    energyConsumption: 0.0
                    smartEnabled: true
        "404":
          description: The specified smart light ID was not found.
    delete:
      description: Permanently removes a smart light pole from the city's infrastructure registry (e.g., due to removal or replacement).
      summary: Delete smart light by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 101
      responses:
        "204":
          description: The smart light was successfully deleted from the system. No content is returned.
          content:
            text/plain:
              examples:
                deleted:
                  value: "Smart light deleted"
        "404":
          description: The specified smart light ID was not found.
  /register:
    post:
      description: Automatically registers this microservice with the central discovery system (e.g., Consul) to enable inter-service communication.
      summary: Register service with discovery system
      responses:
        "200":
          description: Service successfully registered with the discovery node.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: "success"
                    httpCode: 200
                    message: "Service registered"
        "500":
          description: Internal server error preventing successful registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: "error"
                    httpCode: 500
                    message: "Unable to register to Consul"
