    post:
      description: Registers a newly installed smart light pole into the city's infrastructure grid.
      summary: Register new smart light
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLight'
            examples:
              new_light:
                value:
                  zoneId: Z-CENTRO
                  location: Piazza Santa Sofia - Palo 7, Benevento
                  status: 'on'
                  brightness: 90
                  energyConsumption: 1.35
                  smartEnabled: true
      responses:
        '201':
          description: Smart light successfully registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                created:
                  value:
                    id: 103
                    zoneId: Z-CENTRO
                    location: Piazza Santa Sofia - Palo 7, Benevento
                    status: 'on'
                    brightness: 90
                    energyConsumption: 1.35
                    smartEnabled: true
  /light/{id}:
    get:
      description: Fetches real-time telemetry for a specific street light by ID.
      summary: Get smart light details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          light_101:
            value: 101
      responses:
        '200':
          description: Detailed information about the requested smart light.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                light_101:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: Corso Garibaldi - Palo 12, Benevento
                    status: 'on'
                    brightness: 80
                    energyConsumption: 1.25
                    smartEnabled: true
        '404':
          description: The specified smart light ID does not exist.
    put:
      description: Updates the configuration or status of a specific smart light.
      summary: Update smart light by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLight'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Corso Garibaldi - Palo 12, Benevento
                  status: 'off'
                  brightness: 0
                  energyConsumption: 0.0
                  smartEnabled: true
      responses:
        '200':
          description: Smart light data successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                updated:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: Corso Garibaldi - Palo 12, Benevento
                    status: 'off'
                    brightness: 0
                    energyConsumption: 0.0
                    smartEnabled: true
        '404':
          description: The specified smart light ID was not found.
    delete:
      description: Permanently removes a smart light pole from the city's infrastructure registry.
      summary: Delete smart light by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 101
      responses:
        '204':
          description: The smart light was successfully deleted.
        '404':
          description: The specified smart light ID was not found.
  /light/zone/{zoneId}/brightness:
    put:
      description: Dynamically adjust the brightness level for all smart street lights within a specific zone. Useful for reacting to emergencies, traffic incidents, or energy-saving schedules.
      summary: Set brightness for an entire zone
      parameters:
      - name: zoneId
        in: path
        required: true
        schema:
          type: string
        examples:
          zone_centro:
            value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brightness:
                  type: integer
                  description: New brightness level percentage (0 to 100)
                reason:
                  type: string
                  description: Reason for the change (e.g., EMERGENCY, WEATHER_HAZARD, ENERGY_SAVING)
            examples:
              emergency_lighting:
                value:
                  brightness: 100
                  reason: EMERGENCY_VISIBILITY_REQUIRED
              energy_saving:
                value:
                  brightness: 30
                  reason: ENERGY_SAVING_NIGHT_MODE
      responses:
        '200':
          description: Zone brightness successfully updated.
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: Zone brightness updated
  /register:
    post:
      description: Registers this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Internal server error preventing successful registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
