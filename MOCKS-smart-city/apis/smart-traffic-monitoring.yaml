  /traffic-sensor/{id}:
    get:
      description: Retrieve real-time traffic data from a specific sensor by ID.
      summary: Get traffic sensor by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          sensor_1:
            value: 1
      responses:
        '200':
          description: Traffic sensor details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                sensor_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Ponte Vanvitelli, Benevento
                    active: true
                    speedLimit: 50
                    averageSpeed: 22.5
                    vehicleCount: 210
                    congestionLevel: high
                    incidentDetected: false
                    lastUpdated: '2025-09-25T10:15:30Z'
        '404':
          description: Traffic sensor not found
    put:
      description: Update the data of a specific traffic sensor by ID.
      summary: Update traffic sensor by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTrafficSensor'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Ponte Vanvitelli, Benevento
                  active: true
                  speedLimit: 30
                  averageSpeed: 5.0
                  vehicleCount: 300
                  congestionLevel: critical
                  incidentDetected: true
                  lastUpdated: '2025-09-25T11:00:00Z'
      responses:
        '200':
          description: Traffic sensor updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Ponte Vanvitelli, Benevento
                    active: true
                    speedLimit: 30
                    averageSpeed: 5.0
                    vehicleCount: 300
                    congestionLevel: critical
                    incidentDetected: true
                    lastUpdated: '2025-09-25T11:00:00Z'
        '404':
          description: Traffic sensor not found
    delete:
      description: Remove a specific traffic monitoring sensor from the city registry.
      summary: Delete traffic sensor by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Deleted successfully
        '404':
          description: Traffic sensor not found
  /traffic-sensor/zone/{zoneId}/speed-limit:
    put:
      description: Dynamically enforce a new speed limit on digital road signs for an entire city zone. Use this to react to environmental hazards (high pollution, frost warning) or traffic congestion detected by sensors or the Intelligence API.
      summary: Update speed limit for an entire zone
      parameters:
      - name: zoneId
        in: path
        required: true
        schema:
          type: string
        examples:
          zone_centro:
            value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newSpeedLimit:
                  type: integer
                  description: New speed limit in km/h to enforce across the zone
                reason:
                  type: string
                  description: Reason for the change (e.g., HIGH_POLLUTION, INCIDENT_DETECTED, FOG_WARNING)
            examples:
              pollution_limit:
                value:
                  newSpeedLimit: 30
                  reason: HIGH_POLLUTION_ALERT
              incident_limit:
                value:
                  newSpeedLimit: 10
                  reason: INCIDENT_DETECTED
      responses:
        '200':
          description: Zone speed limit updated successfully
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: Zone speed limit updated
  /register:
    post:
      description: Register this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
