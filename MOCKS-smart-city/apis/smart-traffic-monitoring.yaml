openapi: 3.0.2
info:
  title: Smart Traffic Monitoring API
  version: '1.0'
  description: 'Smart Traffic Monitoring API for managing traffic sensors and monitoring points across the city. Compatible with the City Traffic Control System, this service allows interaction with traffic sensor references.

    Supports creation, lookup, update, and deletion of traffic monitoring points including real-time speed, vehicle count, and congestion levels.'
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Traffic+Monitoring+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    TrafficSensor:
      allOf:
        - $ref: '#/components/schemas/NewTrafficSensor'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the traffic sensor
          required:
            - id
    NewTrafficSensor:
      type: object
      properties:
        location:
          type: string
          description: Physical location of the traffic sensor
        active:
          type: boolean
          description: Whether the sensor is currently active
        speedLimit:
          type: integer
          description: Legal speed limit at the sensor location in km/h
        averageSpeed:
          type: number
          format: float
          description: Average vehicle speed detected in km/h
        vehicleCount:
          type: integer
          description: Number of vehicles detected in the last measurement interval
        congestionLevel:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
          description: Current congestion level detected
        incidentDetected:
          type: boolean
          description: Whether a traffic incident has been detected at this location
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last sensor update
      required:
        - location
        - active
        - speedLimit
        - averageSpeed
        - vehicleCount
        - congestionLevel
        - incidentDetected
        - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Traffic Monitoring microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /traffic-sensor:
    get:
      description: Retrieve all traffic sensors deployed across the city, including congestion level, average speed, vehicle count and incident detection status
      summary: List all traffic sensors
      responses:
        '200':
          description: List of all traffic sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrafficSensor'
              examples:
                example_list:
                  value:
                    - id: 1
                      location: Ponte Vanvitelli, Benevento
                      active: true
                      speedLimit: 50
                      averageSpeed: 22.5
                      vehicleCount: 210
                      congestionLevel: high
                      incidentDetected: false
                      lastUpdated: '2025-09-25T10:15:30Z'
                    - id: 2
                      location: Rotonda dei Pentri, Benevento
                      active: true
                      speedLimit: 50
                      averageSpeed: 45.0
                      vehicleCount: 85
                      congestionLevel: low
                      incidentDetected: false
                      lastUpdated: '2025-09-25T09:45:00Z'
    post:
      description: Register a new traffic monitoring sensor in the city traffic control system, specifying location, speed limit, congestion level and activity status
      summary: Register new traffic sensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTrafficSensor'
            examples:
              new_sensor:
                value:
                  location: Viale Principe di Napoli (Stazione Centrale), Benevento
                  active: true
                  speedLimit: 50
                  averageSpeed: 30.0
                  vehicleCount: 120
                  congestionLevel: medium
                  incidentDetected: false
                  lastUpdated: '2025-09-25T10:00:00Z'
      responses:
        '201':
          description: Traffic sensor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                created:
                  value:
                    id: 3
                    location: Viale Principe di Napoli (Stazione Centrale), Benevento
                    active: true
                    speedLimit: 50
                    averageSpeed: 30.0
                    vehicleCount: 120
                    congestionLevel: medium
                    incidentDetected: false
                    lastUpdated: '2025-09-25T10:00:00Z'
  /traffic-sensor/{id}:
    get:
      description: Retrieve real-time traffic data from a specific sensor by ID, including average speed, vehicle count, congestion level and whether an incident has been detected
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            sensor_1:
              value: 1
      responses:
        '200':
          description: Traffic sensor details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                sensor_1:
                  value:
                    id: 1
                    location: Ponte Vanvitelli, Benevento
                    active: true
                    speedLimit: 50
                    averageSpeed: 22.5
                    vehicleCount: 210
                    congestionLevel: high
                    incidentDetected: false
                    lastUpdated: '2025-09-25T10:15:30Z'
        '404':
          description: Traffic sensor not found
    put:
      description: Update the data of a specific traffic sensor by ID, such as congestion level, average speed, vehicle count, incident detection flag or active status
      summary: Update traffic sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTrafficSensor'
            examples:
              update:
                value:
                  location: Ponte Vanvitelli, Benevento
                  active: true
                  speedLimit: 50
                  averageSpeed: 5.0
                  vehicleCount: 300
                  congestionLevel: critical
                  incidentDetected: true
                  lastUpdated: '2025-09-25T11:00:00Z'
      responses:
        '200':
          description: Traffic sensor updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                updated:
                  value:
                    id: 1
                    location: Ponte Vanvitelli, Benevento
                    active: true
                    speedLimit: 50
                    averageSpeed: 5.0
                    vehicleCount: 300
                    congestionLevel: critical
                    incidentDetected: true
                    lastUpdated: '2025-09-25T11:00:00Z'
        '404':
          description: Traffic sensor not found
    delete:
      description: Remove a specific traffic monitoring sensor from the city traffic control system by its ID
      summary: Delete traffic sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Traffic sensor deleted
        '404':
          description: Traffic sensor not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
