openapi: 3.0.2
info:
  title: Smart Traffic and Road Monitoring API
  version: '1.0'
  description: 'API for managing traffic flows, detecting incidents, and enforcing road regulations across the city. Compatible with cross-domain orchestration: use this service to query congestion levels in specific zones (zoneId), filter active incidents, or act as an actuator (e.g., dynamically lowering speed limits in response to pollution alerts from the Sensors API). Supports filtering by zone, congestion level, incident status, and sensor activity.'
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Traffic+and+Road+Monitoring+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    TrafficSensor:
      allOf:
      - $ref: '#/components/schemas/NewTrafficSensor'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the traffic sensor
        required:
        - id
    NewTrafficSensor:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location or intersection of the traffic sensor
        active:
          type: boolean
          description: Whether the sensor is currently active and transmitting data
        speedLimit:
          type: integer
          description: Current legal speed limit enforced at the sensor location in km/h
        averageSpeed:
          type: number
          format: float
          description: Average vehicle speed detected in km/h
        vehicleCount:
          type: integer
          description: Number of vehicles detected in the last measurement interval
        congestionLevel:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          description: Current congestion level detected by the sensor
        incidentDetected:
          type: boolean
          description: True if a traffic incident (crash, stalled vehicle) has been detected
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last sensor data update
      required:
      - zoneId
      - location
      - active
      - speedLimit
      - averageSpeed
      - vehicleCount
      - congestionLevel
      - incidentDetected
      - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Traffic Monitoring microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /traffic-sensor:
    get:
      description: "Retrieve traffic sensors deployed across the city. Use query parameters to filter by zone, congestion level, incident status, or sensor activity - for example to find all active sensors with critical congestion in Z-CENTRO, or all sensors currently detecting an incident, or all inactive sensors for maintenance.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search traffic sensors
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "congestionLevel", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: congestionLevel
        in: query
        schema:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        description: Filter by congestion level (e.g., high or critical to find congested areas)
        examples:
          by_congestion_high:
            value: high
          by_congestion_critical:
            value: critical
          by_congestion_low:
            value: low
          by_congestion_medium:
            value: medium
      - name: incidentDetected
        in: query
        schema:
          type: boolean
        description: Filter sensors where an incident is currently active (true = only incident locations)
        examples:
          incidents_only:
            value: true
          no_incidents:
            value: false
      - name: active
        in: query
        schema:
          type: boolean
        description: Filter by sensor operational status (true = only active sensors, false = offline/inactive)
        examples:
          active_only:
            value: true
          inactive_only:
            value: false
      responses:
        '200':
          description: List of traffic sensors matching the specified filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrafficSensor'
