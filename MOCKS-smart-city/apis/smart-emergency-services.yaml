openapi: 3.0.2
info:
  title: Smart Emergency Services API
  version: '1.0'
  description: 'Smart Emergency Services API for managing emergency units and resources
    in the city. Compatible with the City Response System, this service allows interaction
    with emergency service references.

    Supports creation, lookup, update, and deletion of emergency units including their
    status, availability, active incident tracking, and dispatch information.'
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Emergency+Services+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    EmergencyUnit:
      allOf:
      - $ref: '#/components/schemas/NewEmergencyUnit'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the emergency unit
        required:
        - id
    NewEmergencyUnit:
      type: object
      properties:
        type:
          type: string
          enum:
          - fire
          - police
          - medical
          - rescue
          - hazmat
          description: Type of emergency service unit
        location:
          type: string
          description: Current location or base of the unit
        available:
          type: boolean
          description: Availability status of the unit
        status:
          type: string
          enum:
          - idle
          - responding
          - on-scene
          - returning
          - maintenance
          - unavailable
          description: Operational status of the unit
        incidentId:
          type: string
          nullable: true
          description: Identifier of the incident the unit is currently assigned to
            (null if idle)
        dispatchTime:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the unit was last dispatched (null if idle)
        crewCount:
          type: integer
          description: Number of crew members currently on board
        vehicleCode:
          type: string
          description: Official vehicle registration or fleet code
      required:
      - type
      - location
      - available
      - status
      - crewCount
      - vehicleCode
paths:
  /health:
    get:
      description: Health check endpoint to verify if the Smart Emergency Services API service is running and responsive
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /emergency-unit:
    get:
      description: Retrieve all emergency units registered in the city response system,
        including type, status, current location, crew count and active incident assignment
      summary: List all emergency units
      responses:
        '200':
          description: List of all emergency units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmergencyUnit'
              examples:
                example_list:
                  value:
                  - &id001
                    id: 1
                    type: fire
                    location: Comando Provinciale Vigili del Fuoco, Contrada Capodimonte, Benevento
                    available: false
                    status: responding
                    incidentId: INC-20250925-042
                    dispatchTime: '2025-09-25T09:32:00Z'
                    crewCount: 5
                    vehicleCode: VF-BN-07
                  - id: 2
                    type: medical
                    location: Azienda Ospedaliera San Pio, Via dell'Esperanto 1, Benevento
                    available: true
                    status: idle
                    incidentId: null
                    dispatchTime: null
                    crewCount: 3
                    vehicleCode: CRI-BN-02
    post:
      description: Register a new emergency unit in the city response system, specifying
        type (fire, police, medical, rescue, hazmat), vehicle code and crew count
      summary: Register new emergency unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewEmergencyUnit'
            examples:
              new_unit:
                value:
                  type: police
                  location: Questura di Benevento, Via Raffaele De Caro 11, Benevento
                  available: true
                  status: idle
                  incidentId: null
                  dispatchTime: null
                  crewCount: 2
                  vehicleCode: PS-BN-VOL1
      responses:
        '201':
          description: Emergency unit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyUnit'
              examples:
                created:
                  value:
                    id: 3
                    type: police
                    location: Questura di Benevento, Via Raffaele De Caro 11, Benevento
                    available: true
                    status: idle
                    incidentId: null
                    dispatchTime: null
                    crewCount: 2
                    vehicleCode: PS-BN-VOL1
  /emergency-unit/{id}:
    get:
      description: Retrieve the current status and location of a specific emergency
        unit by ID, including dispatch time and assigned incident ID
      summary: Get emergency unit details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          unit_1:
            value: 1
      responses:
        '200':
          description: Emergency unit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyUnit'
              examples:
                unit_1:
                  value: *id001
        '404':
          description: Emergency unit not found
    put:
      description: Update the operational status of a specific emergency unit by ID,
        such as location, availability, assigned incident, dispatch time or crew count
      summary: Update emergency unit by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewEmergencyUnit'
            examples:
              update:
                value:
                  type: fire
                  location: Comando Provinciale Vigili del Fuoco, Contrada Capodimonte, Benevento
                  available: true
                  status: idle
                  incidentId: null
                  dispatchTime: null
                  crewCount: 5
                  vehicleCode: VF-BN-07
      responses:
        '200':
          description: Emergency unit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyUnit'
              examples:
                updated:
                  value:
                    id: 1
                    type: fire
                    location: Comando Provinciale Vigili del Fuoco, Contrada Capodimonte, Benevento
                    available: true
                    status: idle
                    incidentId: null
                    dispatchTime: null
                    crewCount: 5
                    vehicleCode: VF-BN-07
        '404':
          description: Emergency unit not found
    delete:
      description: Remove a specific emergency unit from the city response system
        registry by its ID
      summary: Delete emergency unit by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Emergency unit deleted
        '404':
          description: Emergency unit not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service to discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul