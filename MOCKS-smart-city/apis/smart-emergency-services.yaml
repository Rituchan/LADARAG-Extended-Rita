openapi: 3.0.2
info:
  title: Smart Emergency Services API
  version: '1.0'
  description: API for managing emergency units and resources across the city. Supports creation, lookup, update, and deletion of emergency units including their status, availability, active incident tracking, and dispatch information. Supports filtering by standardized city zones (zoneId), unit type, and availability, enabling cross-domain orchestration such as finding all available medical units in a zone with an active traffic incident, or coordinating emergency response across multiple domains (traffic, sensors, lighting).
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Emergency+Services+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    EmergencyUnit:
      allOf:
      - $ref: '#/components/schemas/NewEmergencyUnit'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the emergency unit
        required:
        - id
    NewEmergencyUnit:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier where the unit is currently stationed or operating (e.g., Z-CENTRO, Z-NORD)
        type:
          type: string
          enum:
          - fire
          - police
          - medical
          - rescue
          - hazmat
          description: Type of emergency service unit
        location:
          type: string
          description: Current location or base station of the unit
        available:
          type: boolean
          description: Whether the unit is currently available for dispatch (true = idle and ready)
        status:
          type: string
          enum:
          - idle
          - responding
          - on-scene
          - returning
          - maintenance
          - unavailable
          description: Current operational status of the unit
        incidentId:
          type: string
          nullable: true
          description: Identifier of the incident the unit is currently assigned to (null if idle)
        dispatchTime:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the unit was last dispatched (null if idle)
        crewCount:
          type: integer
          description: Number of crew members currently on board
        vehicleCode:
          type: string
          description: Official vehicle registration or fleet code
      required:
      - zoneId
      - type
      - location
      - available
      - status
      - crewCount
      - vehicleCode
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Emergency Services microservice is running and responsive.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /emergency-unit:
    get:
      description: "Retrieve emergency units registered in the city response system. Use query parameters to filter by zone, unit type, availability, or operational status - for example, to find all available medical units in Z-CENTRO, or all fire units currently responding to incidents across the city.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search emergency units
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "available", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
          by_zone_ovest:
            value: Z-OVEST
      - name: available
        in: query
        schema:
          type: boolean
        description: Filter only units currently available for dispatch (true = idle and ready)
        examples:
          available_true:
            value: true
          available_false:
            value: false
      - name: type
        in: query
        schema:
          type: string
          enum:
          - fire
          - police
          - medical
          - rescue
          - hazmat
        description: Filter by emergency unit type
        examples:
          by_type_medical:
            value: medical
      - name: status
        in: query
        schema:
          type: string
          enum:
          - idle
          - responding
          - on-scene
          - returning
          - maintenance
          - unavailable
        description: Filter by operational status
        examples:
          by_status_responding:
            value: responding
      responses:
        '200':
          description: List of emergency units matching the specified filters
          content:
