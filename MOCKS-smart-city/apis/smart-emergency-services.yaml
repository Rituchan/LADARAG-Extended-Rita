                  zoneId: Z-CENTRO
                  type: police
                  location: Questura di Benevento, Via Orazio 5, Benevento
                  available: true
                  status: idle
                  incidentId: null
                  dispatchTime: null
                  crewCount: 4
                  vehicleCode: POL-BN-03
