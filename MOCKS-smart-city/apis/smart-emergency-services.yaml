  /emergency-unit/{id}:
    get:
      description: Retrieve full details of a specific emergency unit by ID.
      summary: Get emergency unit details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          unit_1:
            value: 1
      responses:
        '200':
          description: Emergency unit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyUnit'
              examples:
                unit_1:
                  value:
                    id: 1
                    zoneId: Z-OVEST
                    type: fire
                    location: Comando Provinciale Vigili del Fuoco, Contrada Capodimonte, Benevento
                    available: false
                    status: responding
                    incidentId: INC-20250925-042
                    dispatchTime: '2025-09-25T09:32:00Z'
                    crewCount: 5
                    vehicleCode: VF-BN-07
        '404':
          description: Emergency unit not found
    put:
      description: Update the operational status of a specific emergency unit by ID.
      summary: Update emergency unit by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewEmergencyUnit'
            examples:
              update:
                value:
                  zoneId: Z-OVEST
                  type: fire
                  location: Comando Provinciale Vigili del Fuoco, Contrada Capodimonte, Benevento
                  available: true
                  status: idle
                  incidentId: null
                  dispatchTime: null
                  crewCount: 5
                  vehicleCode: VF-BN-07
      responses:
        '200':
          description: Emergency unit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyUnit'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-OVEST
                    type: fire
                    location: Comando Provinciale Vigili del Fuoco, Contrada Capodimonte, Benevento
                    available: true
                    status: idle
                    incidentId: null
                    dispatchTime: null
                    crewCount: 5
                    vehicleCode: VF-BN-07
        '404':
          description: Emergency unit not found
    delete:
      description: Permanently remove a specific emergency unit from the city registry.
      summary: Delete emergency unit by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Emergency unit deleted
        '404':
          description: Emergency unit not found
  /emergency-unit/zone/{zoneId}/status:
    put:
      description: Trigger a coordinated status update for all emergency units operating in a specific zone. Useful for city-wide emergency protocols such as placing all units in a zone on alert, or releasing them after an incident is resolved.
      summary: Update status of all units in a zone
      parameters:
      - name: zoneId
        in: path
        required: true
        schema:
          type: string
        examples:
          zone_centro:
            value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newStatus:
                  type: string
                  enum:
                  - idle
                  - responding
                  - on-scene
                  - returning
                  - maintenance
                  - unavailable
                  description: New status to apply to all units in this zone
                reason:
                  type: string
                  description: Reason for the status change (e.g., MAJOR_INCIDENT, DRILL, INCIDENT_RESOLVED)
            examples:
              alert_zone:
                value:
                  newStatus: responding
                  reason: MAJOR_INCIDENT_DETECTED
      responses:
        '200':
          description: Zone unit status updated
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: Zone emergency status updated
  /register:
    post:
      description: Register this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
