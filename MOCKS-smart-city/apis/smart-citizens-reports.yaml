    post:
      description: Submits a new citizen report. This is the primary Actuator endpoint for the Smart City Assistant to escalate issues to human operators automatically.
      summary: Submit new citizen report (Open Ticket)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewCitizenReport'
            examples:
              new_report:
                value:
                  zoneId: Z-CENTRO
                  reporterName: Smart City Assistant
                  location: Ponte Vanvitelli, Benevento
                  category: lighting
                  description: 'Segnalazione automatica: Rilevato lampione spento tramite API Sensori, attraversamento pedonale insicuro.'
                  status: open
                  submittedAt: '2025-09-25T11:00:00Z'
      responses:
        '201':
          description: Citizen report successfully received and ticket created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
