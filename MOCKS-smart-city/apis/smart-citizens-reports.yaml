openapi: 3.0.2
info:
  title: Smart Citizens Reports API
  version: '1.0'
  description: |-
    Smart Citizens Reports API empowering residents of Benevento to actively participate in urban maintenance and safety. This API facilitates the submission, categorization, and lifecycle tracking of civic issues.

    Integrated seamlessly with the City Incident Management System, it handles reports ranging from infrastructure damage and sanitation needs to public safety hazards, ensuring transparent communication between citizens and municipal authorities.
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Citizens+Reports+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    CitizenReport:
      allOf:
        - $ref: '#/components/schemas/NewCitizenReport'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique, auto-generated ticket identifier for the citizen report.
          required:
            - id
    NewCitizenReport:
      type: object
      properties:
        reporterName:
          type: string
          description: Full name or registered alias of the citizen submitting the issue (supports anonymous submissions if handled by the client).
        location:
          type: string
          description: Descriptive location or precise address where the reported issue is occurring.
        category:
          type: string
          description: High-level classification of the issue (e.g., 'sanitation', 'infrastructure', 'safety', 'lighting', 'traffic').
        description:
          type: string
          description: Detailed textual explanation of the problem, optionally including specific context or hazards.
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
          description: Current lifecycle state of the ticket. Transitions from 'open' to 'in_progress', and finally 'resolved' or 'closed'.
        submittedAt:
          type: string
          format: date-time
          description: ISO-8601 formatted timestamp recording the exact moment the report was received by the system.
      required:
        - reporterName
        - location
        - category
        - description
        - status
        - submittedAt
paths:
  /health:
    get:
      description: Performs a lightweight health check to verify that the Citizen Reports microservice is operational.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /citizen-report:
    get:
      description: Retrieves a comprehensive list of all reports submitted by citizens, providing an overview of pending and resolved urban issues.
      summary: List all citizen reports
      responses:
        "200":
          description: A JSON array containing the collection of citizen reports.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CitizenReport'
              examples:
                example_list:
                  value:
                    - id: 1
                      reporterName: "Mario Rossi"
                      location: "Piazza Castello, Benevento"
                      category: "sanitation"
                      description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori."
                      status: "open"
                      submittedAt: "2025-09-24T14:30:00Z"
                    - id: 2
                      reporterName: "Giulia Bianchi"
                      location: "Via Posillipo, Benevento"
                      category: "infrastructure"
                      description: "Buca pericolosa e profonda sul manto stradale."
                      status: "in_progress"
                      submittedAt: "2025-09-23T09:15:00Z"
    post:
      description: Submits a new citizen report to the city's Incident Management System. Triggers the creation of a new ticket for municipal review.
      summary: Submit new citizen report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewCitizenReport'
            examples:
              new_report:
                value:
                  reporterName: "Luigi Esposito"
                  location: "Ponte Vanvitelli, Benevento"
                  category: "safety"
                  description: "Lampione spento che rende l'attraversamento pedonale molto insicuro nelle ore serali."
                  status: "open"
                  submittedAt: "2025-09-25T11:00:00Z"
      responses:
        "201":
          description: Citizen report successfully received and ticket created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                created:
                  value:
                    id: 3
                    reporterName: "Luigi Esposito"
                    location: "Ponte Vanvitelli, Benevento"
                    category: "safety"
                    description: "Lampione spento che rende l'attraversamento pedonale molto insicuro nelle ore serali."
                    status: "open"
                    submittedAt: "2025-09-25T11:00:00Z"
  /citizen-report/{id}:
    get:
      description: Fetches the full details and current status of a specific citizen report using its unique ticket ID.
      summary: Get citizen report details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            report_1:
              value: 1
      responses:
        "200":
          description: Detailed information regarding the requested citizen report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                report_1:
                  value:
                    id: 1
                    reporterName: "Mario Rossi"
                    location: "Piazza Castello, Benevento"
                    category: "sanitation"
                    description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori."
                    status: "open"
                    submittedAt: "2025-09-24T14:30:00Z"
        "404":
          description: The specified report ID does not exist in the database.
    put:
      description: Updates an existing citizen report. Typically used by city officials or automated systems to update the ticket's resolution status or amend descriptions.
      summary: Update citizen report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewCitizenReport'
            examples:
              update:
                value:
                  reporterName: "Mario Rossi"
                  location: "Piazza Castello, Benevento"
                  category: "sanitation"
                  description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori - Intervento completato."
                  status: "resolved"
                  submittedAt: "2025-09-24T14:30:00Z"
      responses:
        "200":
          description: Citizen report successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                updated:
                  value:
                    id: 1
                    reporterName: "Mario Rossi"
                    location: "Piazza Castello, Benevento"
                    category: "sanitation"
                    description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori - Intervento completato."
                    status: "resolved"
                    submittedAt: "2025-09-24T14:30:00Z"
        "404":
          description: The specified report ID was not found.
    delete:
      description: Deletes a specific citizen report from the system. Usually reserved for removing spam, duplicates, or erroneous submissions.
      summary: Delete citizen report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        "204":
          description: The report was successfully deleted. No content is returned.
          content:
            text/plain:
              examples:
                deleted:
                  value: "Citizen report deleted"
        "404":
          description: The specified report ID was not found.
  /register:
    post:
      description: Registers this microservice with the central discovery registry (e.g., Consul) to allow routing and integration with other Smart City components.
      summary: Register service to Consul
      responses:
        "200":
          description: Service successfully registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: "success"
                    httpCode: 200
                    message: "Service registered"
        "500":
          description: Internal server error preventing successful registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: "error"
                    httpCode: 500
                    message: "Unable to register to Consul"
