                  value:
                    id: 3
                    zoneId: Z-CENTRO
                    reporterName: Smart City Assistant
                    location: Ponte Vanvitelli, Benevento
                    category: lighting
                    description: 'Segnalazione automatica: Rilevato lampione spento tramite API Sensori, attraversamento pedonale insicuro.'
                    status: open
                    submittedAt: '2025-09-25T11:00:00Z'
  /citizen-report/{id}:
    get:
      description: Fetches the full details and current status of a specific citizen report by ticket ID.
      summary: Get citizen report details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          report_1:
            value: 1
      responses:
        '200':
          description: Detailed information regarding the requested citizen report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                report_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    reporterName: Mario Rossi
                    location: Piazza Castello, Benevento
                    category: sanitation
                    description: Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori.
                    status: open
                    submittedAt: '2025-09-24T14:30:00Z'
        '404':
          description: The specified report ID does not exist in the database.
    put:
      description: Updates an existing citizen report. Typically used by city officials to update the ticket's resolution status.
      summary: Update citizen report by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewCitizenReport'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  reporterName: Mario Rossi
                  location: Piazza Castello, Benevento
                  category: sanitation
                  description: Cestino traboccante - Intervento completato.
                  status: resolved
                  submittedAt: '2025-09-24T14:30:00Z'
      responses:
        '200':
          description: Citizen report successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    reporterName: Mario Rossi
                    location: Piazza Castello, Benevento
                    category: sanitation
                    description: Cestino traboccante - Intervento completato.
                    status: resolved
                    submittedAt: '2025-09-24T14:30:00Z'
        '404':
          description: The specified report ID was not found.
    delete:
      description: Deletes a specific citizen report from the system.
      summary: Delete citizen report by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: The report was successfully deleted.
        '404':
          description: The specified report ID was not found.
  /register:
    post:
      description: Registers this microservice with the central discovery registry.
      summary: Register service to Consul
      responses:
        '200':
          description: Service successfully registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Internal server error preventing successful registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
