openapi: 3.0.2
info:
  title: Smart Citizens Reports and Ticketing API
  version: '1.0'
  description: 'API empowering residents and the Smart City Virtual Assistant to actively participate in urban maintenance. This is the primary action interface for the Help System: it allows the creation, categorization, and tracking of civic issues (tickets). Supports cross-domain integration via ''zoneId'' and multi-zone queries (zoneIds) to find open tickets across all zones returned by a previous task (e.g., zones with active sensor alerts or traffic incidents).'
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Citizens+Reports+and+Ticketing+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    CitizenReport:
      allOf:
      - $ref: '#/components/schemas/NewCitizenReport'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique, auto-generated ticket identifier for the citizen report.
        required:
        - id
    NewCitizenReport:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier where the issue is located (e.g., Z-CENTRO, Z-NORD).
        reporterName:
          type: string
          description: Full name of the citizen or 'Smart City Assistant' if auto-generated by the AI.
        location:
          type: string
          description: Descriptive location or precise address where the reported issue is occurring.
        category:
          type: string
          enum:
          - sanitation
          - infrastructure
          - safety
          - lighting
          - traffic
          - environment
          - other
          description: High-level classification of the issue mapping to other city domains.
        description:
          type: string
          description: Detailed textual explanation of the problem.
        status:
          type: string
          enum:
          - open
          - in_progress
          - resolved
          - closed
          description: Current lifecycle state of the ticket.
        submittedAt:
          type: string
          format: date-time
          description: ISO-8601 formatted timestamp recording the exact moment the report was received.
      required:
      - zoneId
      - reporterName
      - location
      - category
      - description
      - status
      - submittedAt
paths:
  /health:
    get:
      description: Performs a lightweight health check to verify that the Citizen Reports microservice is operational.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /citizen-report:
    get:
      description: "Retrieves a list of citizen reports. Crucial for the Assistant to check if a specific issue in a zone has already been reported before creating a duplicate ticket. Use query parameters to filter by zone, multiple zones, status, or category - for example to find all open lighting reports in Z-CENTRO, or all open reports across every zone with active environmental alerts.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search citizen reports
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "status", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: zoneIds
        in: query
        schema:
          type: array
          items:
            type: string
            enum:
            - Z-CENTRO
            - Z-NORD
            - Z-SUD
            - Z-EST
            - Z-OVEST
        style: form
        explode: false
        description: 'Multiple city zones, comma-separated. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST. Example: Z-CENTRO,Z-NORD,Z-SUD.'
        examples:
          multiple_zones:
            value: Z-CENTRO,Z-NORD
      - name: status
        in: query
        schema:
          type: string
          enum:
          - open
          - in_progress
          - resolved
          - closed
        description: Filter by ticket status (e.g., open, resolved)
        examples:
          by_status_open:
            value: open
          by_status_closed:
            value: closed
      - name: category
        in: query
        schema:
          type: string
          enum:
          - sanitation
          - infrastructure
          - safety
          - lighting
          - traffic
          - environment
          - other
        description: Filter by issue category (e.g., lighting, sanitation)
        examples:
          by_category_lighting:
            value: lighting
      responses:
        '200':
          description: List of citizen reports matching the specified filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CitizenReport'
              examples:
                example_list:
                  value:
                  - id: 1
                    zoneId: Z-CENTRO
                    reporterName: Mario Rossi
                    location: Piazza Castello, Benevento
                    category: sanitation
                    description: Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori.
                    status: open
                    submittedAt: '2025-09-24T14:30:00Z'
                  - id: 2
                    zoneId: Z-NORD
                    reporterName: Giulia Bianchi
                    location: Via Posillipo, Benevento
                    category: infrastructure
