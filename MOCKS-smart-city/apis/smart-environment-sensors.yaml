                    zoneId: Z-CENTRO
                    location: Duomo di Benevento, Piazza Duomo
                    sensorType: air_quality
                    lastReading: 55.2
                    readingUnit: AQI
                    threshold: 100.0
                    alertActive: false
                    alertReason: NONE
                    batteryLevel: 90
                    lastUpdated: '2025-09-25T10:00:00Z'
                    status: active
                  - id: 2
                    zoneId: Z-NORD
