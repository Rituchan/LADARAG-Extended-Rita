openapi: 3.0.2
info:
  title: Smart Environment and Temperature Sensors API
  version: '1.0'
  description: API for environmental monitoring across the city. Provides real-time data on ambient temperature (Celsius), air quality (AQI), humidity, noise, and weather alerts. Crucial for querying weather conditions or triggering cross-domain actions (e.g., imposing traffic limits during high pollution or frost). Supports querying by standardized city zone, sensor type, active alert status, and operational status to identify faulty or low-battery sensors requiring maintenance.
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Environment+and+Temperature+Sensors+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    Sensor:
      allOf:
      - $ref: '#/components/schemas/NewSensor'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the sensor device
        required:
        - id
    NewSensor:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location or exact address of the sensor
        sensorType:
          type: string
          enum:
          - temperature
          - humidity
          - air_quality
          - noise
          - light
          - pressure
          - wind_speed
          description: Type of environmental metric tracked by the sensor
        lastReading:
          type: number
          format: float
          description: Most recent sensor reading value (e.g., temperature in Celsius, AQI value)
        readingUnit:
          type: string
          enum:
          - Celsius
          - '%'
          - AQI
          - dB
          - lux
          - hPa
          - km/h
          description: Unit of measurement for the last reading
        threshold:
          type: number
          format: float
          description: Alert threshold value - when lastReading exceeds this, alertActive becomes true
        alertActive:
          type: boolean
          description: True if the current reading exceeds safe thresholds and triggers an alert
        alertReason:
          type: string
          description: Specific reason for the alert if active (e.g., HIGH_POLLUTION, FROST_WARNING, HIGH_NOISE, NONE)
        batteryLevel:
          type: integer
          minimum: 0
          maximum: 100
          description: Battery level of the embedded IoT sensor (0-100%)
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last reading update
        status:
          type: string
          enum:
          - active
          - inactive
          - maintenance
          - low_battery
          - fault
          description: Current operational status of the sensor device
      required:
      - zoneId
      - location
      - sensorType
      - lastReading
      - readingUnit
      - threshold
      - alertActive
      - alertReason
      - batteryLevel
      - lastUpdated
      - status
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Sensors microservice is reachable and responsive.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /sensor:
    get:
      description: "Retrieve environmental sensors deployed across the city. Use query parameters to filter by zone, sensor type, alert status, or operational status - for example to find all active air quality sensors in Z-CENTRO with an active alert, all noise sensors across the city, or all sensors in fault/maintenance state for servicing.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search environmental sensors
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "sensorType", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: sensorType
        in: query
        schema:
          type: string
          enum:
          - temperature
          - humidity
          - air_quality
          - noise
          - light
          - pressure
          - wind_speed
        description: "Filter by sensor type \u2014 use exact enum value"
        examples:
          air_quality:
            value: air_quality
          temperature:
            value: temperature
          humidity:
            value: humidity
          noise:
            value: noise
          pressure:
            value: pressure
          wind_speed:
            value: wind_speed
          light:
            value: light
      - name: alertActive
        in: query
        schema:
          type: boolean
        description: Filter sensors currently triggering an alert (true = only sensors in alert state)
        examples:
          alert_active_true:
            value: true
          alert_active_false:
            value: false
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - inactive
          - maintenance
          - low_battery
          - fault
        description: Filter by operational status - use 'active' for reliable readings, 'fault' or 'maintenance' to identify sensors needing service, 'low_battery' to prioritize battery replacements
        examples:
          active_only:
            value: active
          needs_service:
            value: fault
          low_battery:
            value: low_battery
      responses:
        '200':
          description: List of environmental sensors matching the specified filters
