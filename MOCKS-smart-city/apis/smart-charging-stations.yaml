openapi: 3.0.2
info:
  title: Smart Charging Stations API
  version: '1.0'
  description: API for managing EV charging infrastructure across the city. Supports creation, lookup, update, and deletion of charging stations, including real-time availability, active connectors, power output, and pricing. Supports filtering by standardized city zones (zoneId), availability, and charging speed, enabling cross-domain orchestration such as finding a rapid charger in a zone with low traffic congestion or near a tourist attraction.
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Charging+Stations+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    ChargingStation:
      allOf:
      - $ref: '#/components/schemas/NewChargingStation'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the charging station
        required:
        - id
    NewChargingStation:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location or address of the charging station
        available:
          type: boolean
          description: Whether at least one connector is currently available for use
        connectors:
          type: integer
          description: Total number of charging connectors at the station
        activeConnectors:
          type: integer
          description: Number of connectors currently in use (charging sessions active)
        chargingSpeed:
          type: string
          enum:
          - slow
          - fast
          - rapid
          - ultra_rapid
          description: Maximum charging speed category of the station
        maxPowerKW:
          type: number
          format: float
          description: Maximum power output in kilowatts
        pricePerKWh:
          type: number
          format: float
          description: Current price per kWh in local currency
        status:
          type: string
          enum:
          - operational
          - busy
          - maintenance
          - offline
          description: Current operational status of the station
      required:
      - zoneId
      - location
      - available
      - connectors
      - activeConnectors
      - chargingSpeed
      - maxPowerKW
      - pricePerKWh
      - status
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Charging Stations microservice is reachable and responsive.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /charging-station:
    get:
      description: "Retrieve EV charging stations registered in the city. Use query parameters to filter by zone, availability, charging speed, or operational status - for example, to find all available rapid chargers in Z-CENTRO, or all stations in a specific zone for mobility planning and EV route optimization.\n\n**Mock constraint \u2014 one filter per request**: this mock dispatcher resolves a single query parameter at a time. Combining multiple query parameters is NOT supported \u2014 only the primary dispatcher parameter is matched. Issue separate requests for each filter and merge results client-side."
      summary: Search charging stations
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{"dispatcher": "URI_PARAMS", "dispatcherRules": "available", "fallback": "example_list"}'
      parameters:
      - name: zoneId
        in: query
        schema:
          type: string
          enum:
          - Z-CENTRO
          - Z-NORD
          - Z-SUD
          - Z-EST
          - Z-OVEST
        description: 'City zone identifier. Valid values: Z-CENTRO, Z-NORD, Z-SUD, Z-EST, Z-OVEST.'
        examples:
          by_zone_centro:
            value: Z-CENTRO
          by_zone_nord:
            value: Z-NORD
          by_zone_sud:
            value: Z-SUD
          by_zone_est:
            value: Z-EST
      - name: available
        in: query
        schema:
          type: boolean
        description: Filter only stations with at least one free connector (true = available only)
        examples:
          available_true:
            value: true
          available_false:
            value: false
      - name: chargingSpeed
        in: query
        schema:
          type: string
          enum:
          - slow
          - fast
          - rapid
          - ultra_rapid
        description: Filter by minimum charging speed required
        examples:
          by_speed_rapid:
            value: rapid
      - name: status
        in: query
        schema:
          type: string
          enum:
          - operational
          - busy
          - maintenance
          - offline
        description: Filter by operational status
        examples:
          by_status_operational:
            value: operational
      responses:
        '200':
          description: List of charging stations matching the specified filters
