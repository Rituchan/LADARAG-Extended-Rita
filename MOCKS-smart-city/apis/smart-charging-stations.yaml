                    id: 3
                    zoneId: Z-EST
                    location: Terminal Bus Extraurbani, Piazzale Venanzio Vari, Benevento
                    available: true
                    connectors: 6
                    activeConnectors: 0
                    chargingSpeed: ultra_rapid
                    maxPowerKW: 150.0
                    pricePerKWh: 0.75
                    status: operational
  /charging-station/{id}:
    get:
      description: Retrieve the current status of a specific EV charging station by ID.
      summary: Get charging station details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          station_1:
            value: 1
      responses:
        '200':
          description: Charging station details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargingStation'
              examples:
                station_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Parcheggio Via Vittorio Veneto, Benevento
                    available: true
                    connectors: 4
                    activeConnectors: 1
                    chargingSpeed: fast
                    maxPowerKW: 22.0
                    pricePerKWh: 0.45
                    status: operational
        '404':
          description: Charging station not found
    put:
      description: Update the status or configuration of a specific EV charging station by ID.
      summary: Update charging station details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewChargingStation'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Parcheggio Via Vittorio Veneto, Benevento
                  available: false
                  connectors: 4
                  activeConnectors: 4
                  chargingSpeed: fast
                  maxPowerKW: 22.0
                  pricePerKWh: 0.45
                  status: busy
      responses:
        '200':
          description: Charging station updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargingStation'
              examples:
