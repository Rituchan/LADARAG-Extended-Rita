                    location: Parcheggio Via Vittorio Veneto, Benevento
                    available: false
                    connectors: 4
                    activeConnectors: 4
                    chargingSpeed: fast
                    maxPowerKW: 22.0
                    pricePerKWh: 0.45
                    status: busy
        '404':
          description: Charging station not found
    delete:
      description: Permanently remove a specific charging station from the city registry.
      summary: Delete charging station by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
