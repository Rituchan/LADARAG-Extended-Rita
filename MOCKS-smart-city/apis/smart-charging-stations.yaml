openapi: 3.0.2
info:
  title: Smart Charging Stations API
  version: '1.0'
  description: 'Smart Charging Stations API for managing EV charging infrastructure
    across the city. Compatible with the City Mobility System, this service allows
    interaction with charging station references.

    Supports creation, lookup, update, and deletion of charging stations, including
    real-time availability, power output, active sessions, and pricing.'
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:8585/rest/Smart+Charging+Stations+API/1.0
  description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    ChargingStation:
      allOf:
      - $ref: '#/components/schemas/NewChargingStation'
      - properties:
          id:
            type: integer
            format: int64
            description: Unique identifier for the charging station
        required:
        - id
    NewChargingStation:
      type: object
      properties:
        location:
          type: string
          description: Physical location of the charging station
        available:
          type: boolean
          description: Whether at least one connector is currently available
        connectors:
          type: integer
          description: Total number of charging connectors at the station
        activeConnectors:
          type: integer
          description: Number of connectors currently in use
        chargingSpeed:
          type: string
          enum:
          - slow
          - fast
          - rapid
          - ultra_rapid
          description: Maximum charging speed category of the station
        maxPowerKW:
          type: number
          format: float
          description: Maximum power output in kilowatts
        pricePerKWh:
          type: number
          format: float
          description: Current price per kWh in local currency
        status:
          type: string
          enum:
          - operational
          - busy
          - maintenance
          - offline
          description: Current operational status of the station
      required:
      - location
      - available
      - connectors
      - activeConnectors
      - chargingSpeed
      - maxPowerKW
      - pricePerKWh
      - status
paths:
  /health:
    get:
      description: Health check endpoint to verify if the Smart Charging Stations API service is running and responsive
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
                  
  /charging-station:
    get:
      description: Retrieve all EV charging stations in the city, including availability,
        number of active connectors, charging speed, max power output and price per
        kWh
      summary: List all charging stations
      responses:
        '200':
          description: List of all charging stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChargingStation'
              examples:
                example_list:
                  value:
                  - &id001
                    id: 1
                    location: Parcheggio Via Vittorio Veneto, Benevento
                    available: true
                    connectors: 4
                    activeConnectors: 1
                    chargingSpeed: fast
                    maxPowerKW: 22.0
                    pricePerKWh: 0.45
                    status: operational
                  - id: 2
                    location: Piazzale Colonna (Stazione Centrale FS), Benevento
                    available: false
                    connectors: 2
                    activeConnectors: 2
                    chargingSpeed: rapid
                    maxPowerKW: 50.0
                    pricePerKWh: 0.60
                    status: busy
    post:
      description: Register a new EV charging station in the city mobility system,
        specifying location, connector count, charging speed, max power and pricing
      summary: Register new charging station
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewChargingStation'
            examples:
              new_station:
                value:
                  location: Terminal Bus Extraurbani, Piazzale Venanzio Vari, Benevento
                  available: true
                  connectors: 6
                  activeConnectors: 0
                  chargingSpeed: ultra_rapid
                  maxPowerKW: 150.0
                  pricePerKWh: 0.75
                  status: operational
      responses:
        '201':
          description: Charging station created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargingStation'
              examples:
                created:
                  value:
                    id: 3
                    location: Terminal Bus Extraurbani, Piazzale Venanzio Vari, Benevento
                    available: true
                    connectors: 6
                    activeConnectors: 0
                    chargingSpeed: ultra_rapid
                    maxPowerKW: 150.0
                    pricePerKWh: 0.75
                    status: operational
  /charging-station/{id}:
    get:
      description: Retrieve the current status of a specific EV charging station by
        ID, including available connectors, active sessions, power output and price
      summary: Get charging station details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        examples:
          station_1:
            value: 1
      responses:
        '200':
          description: Charging station details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargingStation'
              examples:
                station_1:
                  value: *id001
        '404':
          description: Charging station not found
    put:
      description: Update the status or configuration of a specific EV charging station
        by ID, such as availability, active connectors, pricing or operational status
      summary: Update charging station details by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          updated:
            value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewChargingStation'
            examples:
              update:
                value:
                  location: Parcheggio Via Vittorio Veneto, Benevento
                  available: false
                  connectors: 4
                  activeConnectors: 4
                  chargingSpeed: fast
                  maxPowerKW: 22.0
                  pricePerKWh: 0.45
                  status: busy
      responses:
        '200':
          description: Charging station updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargingStation'
              examples:
                updated:
                  value:
                    id: 1
                    location: Parcheggio Via Vittorio Veneto, Benevento
                    available: false
                    connectors: 4
                    activeConnectors: 4
                    chargingSpeed: fast
                    maxPowerKW: 22.0
                    pricePerKWh: 0.45
                    status: busy
        '404':
          description: Charging station not found
    delete:
      description: Remove a specific EV charging station from the city mobility registry
        by its ID
      summary: Delete charging station by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        examples:
          deleted:
            value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Charging station deleted
        '404':
          description: Charging station not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service to Consul
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul