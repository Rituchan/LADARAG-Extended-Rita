openapi: 3.0.0
info:
  title: Spotify
  version: '1.0'
  description: Music streaming service API. Manage playlists, control playback, search for tracks, albums and artists, follow artists, manage the playback queue, retrieve saved songs and albums, and control volume and repeat mode.
paths:
  /search:
    get:
      operationId: search
      description: Search for tracks, artists, or albums by keyword. Use the `type` parameter to specify the entity type (track, album, artist).
      summary: Search for tracks, artists, albums
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
        example: Mariah Carey
      - name: type
        in: query
        required: true
        schema:
          type: string
        example: track
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  tracks:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            artists:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  name:
                                    type: string
                  albums:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            release_date:
                              type: string
                            artists:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  name:
                                    type: string
                  artists:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
              examples:
                mock:
                  value:
                    tracks:
                      items:
                      - id: 4iV5W9uYEdYUVa79Axb7Rh
                        name: We Belong Together
                        artists:
                        - id: 4gH7kN1gxpyG0TqR3KxI1h
                          name: Mariah Carey
                        uri: spotify:track:4iV5W9uYEdYUVa79Axb7Rh
                      - id: 1x6FsdRG7kpYk5L4vrBz0g
                        name: All I Want for Christmas Is You
                        artists:
                        - id: 4gH7kN1gxpyG0TqR3KxI1h
                          name: Mariah Carey
                        uri: spotify:track:1x6FsdRG7kpYk5L4vrBz0g
                mock_album:
                  value:
                    albums:
                      items:
                      - id: 4aawyAB9vmqN3uQ7FjRGTy
                        name: The Dark Side of the Moon
                        release_date: '1973-03-01'
                        artists:
                        - id: 5f4g5h6i7j8k9l0m1n2o
                          name: Pink Floyd
                        uri: spotify:album:4aawyAB9vmqN3uQ7FjRGTy
                      - id: 5bBzY9vmqN3uQ7FjRGTyZx
                        name: The Wall
                        release_date: '1979-11-30'
                        artists:
                        - id: 5f4g5h6i7j8k9l0m1n2o
                          name: Pink Floyd
                        uri: spotify:album:5bBzY9vmqN3uQ7FjRGTyZx
                mock_artist:
                  value:
                    artists:
                      items:
                      - id: 5f4g5h6i7j8k9l0m1n2o
                        name: Taylor Swift
                      - id: 4gH7kN1gxpyG0TqR3KxI1h
                        name: Mariah Carey
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me:
    get:
      operationId: getMe
      description: Get the profile of the currently authenticated Spotify user, including id, display name and email.
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  display_name:
                    type: string
                  email:
                    type: string
              examples:
                mock:
                  value:
                    id: 31l2b3c4d5e6f7g8h9i0j
                    display_name: Test User
                    email: testuser@example.com
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /users/{user_id}/playlists:
    post:
      operationId: createPlaylist
      description: Create a new playlist for the specified user. The playlist can be set as public or private and given an optional description.
      summary: Create a playlist
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        example: 31l2b3c4d5e6f7g8h9i0j
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                public:
                  type: boolean
            example:
              name: Love Mariah
              description: A playlist dedicated to Mariah Carey
              public: true
      responses:
        '201':
          description: Playlist created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  owner:
                    type: object
                    properties:
                      id:
                        type: string
                      display_name:
                        type: string
              examples:
                mock:
                  value:
                    id: 3c4d5e6f7g8h9i0j1k2l
                    name: Love Mariah
                    owner:
                      id: 31l2b3c4d5e6f7g8h9i0j
                      display_name: Test User
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /playlists/{playlist_id}/tracks:
    post:
      operationId: addTracksToPlaylist
      description: Add one or more tracks to an existing playlist by providing their Spotify URIs. An optional position can be specified for insertion order.
      summary: Add tracks to a playlist
      parameters:
      - name: playlist_id
        in: path
        required: true
        schema:
          type: string
        example: 3c4d5e6f7g8h9i0j1k2l
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uris:
                  type: array
                  items:
                    type: string
                position:
                  type: integer
            example:
              uris:
              - spotify:track:4iV5W9uYEdYUVa79Axb7Rh
              position: 0
      responses:
        '201':
          description: Tracks added
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot_id:
                    type: string
              examples:
                mock:
                  value:
                    snapshot_id: MSw0YzVkZTZmN2c4aDlpMGoxazJs
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
    delete:
      operationId: removeTracksFromPlaylist
      description: Remove one or more tracks from a playlist by providing their Spotify URIs.
      summary: Remove tracks from a playlist
      parameters:
      - name: playlist_id
        in: path
        required: true
        schema:
          type: string
        example: 3c4d5e6f7g8h9i0j1k2l
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tracks:
                  type: array
                  items:
                    type: object
                    properties:
                      uri:
                        type: string
            example:
              tracks:
              - uri: spotify:track:4iV5W9uYEdYUVa79Axb7Rh
      responses:
        '200':
          description: Tracks removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot_id:
                    type: string
              examples:
                mock:
                  value:
                    snapshot_id: NSw0YzVkZTZmN2c4aDlpMGoxazJs
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
    get:
      operationId: getPlaylistTracks
      description: Retrieve the list of tracks contained in a specific playlist.
      summary: Get playlist tracks
      parameters:
      - name: playlist_id
        in: path
        required: true
        schema:
          type: string
        example: 3c4d5e6f7g8h9i0j1k2l
      responses:
        '200':
          description: Playlist tracks
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        track:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
              examples:
                mock:
                  value:
                    items:
                    - track:
                        id: 4iV5W9uYEdYUVa79Axb7Rh
                        name: We Belong Together
                        uri: spotify:track:4iV5W9uYEdYUVa79Axb7Rh
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /albums/{id}/tracks:
    get:
      operationId: getAlbumTracks
      description: Retrieve the tracklist of an album by its Spotify ID.
      summary: Get album tracks
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: 4aawyAB9vmqN3uQ7FjRGTy
      responses:
        '200':
          description: Album tracks
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        track_number:
                          type: integer
              examples:
                mock:
                  value:
                    items:
                    - id: 6hHcY0s4Vq0pXlJYg7eHjL
                      name: Speak to Me
                      track_number: 1
                      uri: spotify:track:6hHcY0s4Vq0pXlJYg7eHjL
                    - id: 7kKj5XxY7pYlJYg7eHjLmN
                      name: Breathe
                      track_number: 2
                      uri: spotify:track:7kKj5XxY7pYlJYg7eHjLmN
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/player/queue:
    post:
      operationId: addToQueue
      description: Add a track or episode to the end of the current user's playback queue by providing its Spotify URI.
      summary: Add item to playback queue
      parameters:
      - name: uri
        in: query
        required: true
        schema:
          type: string
        example: spotify:track:6hHcY0s4Vq0pXlJYg7eHjL
      responses:
        '204':
          description: Command sent
          content:
            application/json:
              examples:
                ok: &id001
                  value: {}
                mock: *id001
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
    get:
      operationId: getQueue
      description: Get the list of tracks currently queued for playback on the user's active device.
      summary: Get playback queue
      responses:
        '200':
          description: Current queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
              examples:
                mock:
                  value:
                    queue:
                    - id: 6hHcY0s4Vq0pXlJYg7eHjL
                      name: Summertime Sadness
                      uri: spotify:track:6hHcY0s4Vq0pXlJYg7eHjL
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/playlists:
    get:
      operationId: getMyPlaylists
      description: Get the playlists owned or followed by the current authenticated user.
      summary: Get current user playlists
      responses:
        '200':
          description: User playlists
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        public:
                          type: boolean
              examples:
                mock:
                  value:
                    items:
                    - id: 3c4d5e6f7g8h9i0j1k2l
                      name: My Rock
                      public: true
                    - id: 4d5e6f7g8h9i0j1k2l3m
                      name: My R&B
                      public: false
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/player/next:
    post:
      operationId: skipToNext
      description: Skip to the next track in the current user's playback queue.
      summary: Skip to next track
      responses:
        '204':
          description: Command sent
          content:
            application/json:
              examples:
                ok: &id002
                  value: {}
                mock: *id002
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/player/volume:
    put:
      operationId: setVolume
      description: Set the playback volume for the current user's active device. Accepts a percentage value between 0 and 100.
      summary: Set playback volume
      parameters:
      - name: volume_percent
        in: query
        required: true
        schema:
          type: integer
        example: 60
      responses:
        '204':
          description: Command sent
          content:
            application/json:
              examples:
                ok: &id003
                  value: {}
                mock: *id003
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/player/currently-playing:
    get:
      operationId: getCurrentlyPlaying
      description: Get information about the track currently playing on the user's active device, including playback state, track details, and album.
      summary: Get currently playing track
      responses:
        '200':
          description: Currently playing
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_playing:
                    type: boolean
                  item:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      artists:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                      album:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
              examples:
                mock:
                  value:
                    is_playing: true
                    item:
                      id: 6hHcY0s4Vq0pXlJYg7eHjL
                      name: Summertime Sadness
                      artists:
                      - id: 5f4g5h6i7j8k9l0m1n2o
                        name: Lana Del Rey
                      album:
                        id: 4aawyAB9vmqN3uQ7FjRGTy
                        name: Born to Die
                      uri: spotify:track:6hHcY0s4Vq0pXlJYg7eHjL
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/tracks:
    put:
      operationId: saveTracks
      description: Save one or more tracks to the current user's Spotify library by providing their track IDs.
      summary: Save tracks for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
            example:
              ids:
              - 4iV5W9uYEdYUVa79Axb7Rh
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                example: &id004
                  value: {}
                mock: *id004
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
    get:
      operationId: getMyTracks
      description: Retrieve the list of tracks saved in the current user's Spotify library.
      summary: Get user saved tracks
      responses:
        '200':
          description: Saved tracks
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        track:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
              examples:
                mock:
                  value:
                    items:
                    - track:
                        id: 4iV5W9uYEdYUVa79Axb7Rh
                        name: We Belong Together
                        uri: spotify:track:4iV5W9uYEdYUVa79Axb7Rh
                    - track:
                        id: 6hHcY0s4Vq0pXlJYg7eHjL
                        name: Summertime Sadness
                        uri: spotify:track:6hHcY0s4Vq0pXlJYg7eHjL
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
    delete:
      operationId: removeTracks
      description: Remove one or more tracks from the current user's Spotify library by providing their track IDs.
      summary: Remove user saved tracks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
            example:
              ids:
              - 4iV5W9uYEdYUVa79Axb7Rh
      responses:
        '200':
          description: Tracks removed
        '204':
          description: Command sent
          content:
            application/json:
              examples:
                ok: &id005
                  value: {}
                mock: *id005
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/following:
    get:
      operationId: getFollowing
      description: Get the artists or users followed by the current authenticated user. Use the `type` parameter to filter by entity type (artist or user).
      summary: Get artists/users followed
      parameters:
      - name: type
        in: query
        required: true
        schema:
          type: string
        example: artist
      responses:
        '200':
          description: Followed artists
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
              examples:
                mock:
                  value:
                    artists:
                      items:
                      - id: 5f4g5h6i7j8k9l0m1n2o
                        name: Taylor Swift
                      - id: 4gH7kN1gxpyG0TqR3KxI1h
                        name: Mariah Carey
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
    put:
      operationId: followArtists
      description: Follow one or more artists or users on behalf of the current authenticated user by providing their IDs.
      summary: Follow artists or users
      parameters:
      - name: type
        in: query
        required: true
        schema:
          type: string
        example: artist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
            example:
              ids:
              - 5f4g5h6i7j8k9l0m1n2o
      responses:
        '204':
          description: Command sent
          content:
            application/json:
              examples:
                ok: &id006
                  value: {}
                mock: *id006
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
    delete:
      operationId: unfollowArtists
      description: Unfollow one or more artists or users on behalf of the current authenticated user by providing their IDs.
      summary: Unfollow artists or users
      parameters:
      - name: type
        in: query
        required: true
        schema:
          type: string
        example: artist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
            example:
              ids:
              - 5f4g5h6i7j8k9l0m1n2o
      responses:
        '204':
          description: Command sent
          content:
            application/json:
              examples:
                ok: &id007
                  value: {}
                mock: *id007
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /artists/{id}/albums:
    get:
      operationId: getArtistAlbums
      description: Get the list of albums released by a specific artist, identified by their Spotify ID.
      summary: Get artist albums
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: 5f4g5h6i7j8k9l0m1n2o
      responses:
        '200':
          description: Artist albums
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        release_date:
                          type: string
              examples:
                mock:
                  value:
                    items:
                    - id: 4aawyAB9vmqN3uQ7FjRGTy
                      name: The Dark Side of the Moon
                      release_date: '1973-03-01'
                    - id: 5bBzY9vmqN3uQ7FjRGTyZx
                      name: The Wall
                      release_date: '1979-11-30'
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /tracks/{id}:
    get:
      operationId: getTrack
      description: Get detailed information about a specific track by its Spotify ID, including name, artists, and album.
      summary: Get track information
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: 6hHcY0s4Vq0pXlJYg7eHjL
      responses:
        '200':
          description: Track info
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  artists:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                  album:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
              examples:
                mock:
                  value:
                    id: 6hHcY0s4Vq0pXlJYg7eHjL
                    name: Summertime Sadness
                    artists:
                    - id: 5f4g5h6i7j8k9l0m1n2o
                      name: Lana Del Rey
                    album:
                      id: 4aawyAB9vmqN3uQ7FjRGTy
                      name: Born to Die
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /track/{id}:
    get:
      operationId: getTrackById
      description: Alternative endpoint to retrieve track information by Spotify track ID, returning name and associated artists.
      summary: Get a track by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: 7kKj5XxY7pYlJYg7eHjLmN
      responses:
        '200':
          description: Track info
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  artists:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
              examples:
                mock:
                  value:
                    id: 7kKj5XxY7pYlJYg7eHjLmN
                    name: When You Believe
                    artists:
                    - id: 4gH7kN1gxpyG0TqR3KxI1h
                      name: Mariah Carey
                    - id: 7n2wHs1TKA6G6SjzZsVf1h
                      name: Whitney Houston
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return 'mock'
  /me/player/play:
    put:
      operationId: resumePlayback
      description: Start or resume playback on the user's active device. Optionally specify a context URI (album, playlist) or a list of track URIs to play.
      summary: Start/resume playback
      parameters:
      - name: device_id
        in: query
        schema:
          type: string
        example: abc123
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                context_uri:
                  type: string
                uris:
                  type: array
                  items:
                    type: string
            example:
              context_uri: spotify:album:4aawyAB9vmqN3uQ7FjRGTy
      responses:
        '204':
          description: Command sent
          content:
            application/json:
              examples:
